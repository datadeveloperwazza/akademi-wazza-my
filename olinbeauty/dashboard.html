<!DOCTYPE html>
<html lang="ms">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Kedai Olin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="olin.css">
</head>
<body>
  <div class="topbar">
    <a class="back" href="portal.html">&larr;</a>
    <span class="title">📊 <span class="dot">Dashboard</span></span>
    <button class="btn-ghost btn-sm" style="margin-left:auto;border:none;cursor:pointer" onclick="load()">↻</button>
  </div>

  <div class="wrap">
    <p class="muted" style="margin:2px 2px 14px">Setakat <span id="tarikh">—</span></p>

    <div class="kpi">
      <div class="box"><div class="lbl">Jualan Hari Ini</div><div class="val accent" id="jHari">—</div></div>
      <div class="box"><div class="lbl">Jualan Bulan Ini</div><div class="val" id="jBulan">—</div></div>
      <div class="box"><div class="lbl">Jualan Tahun Ini</div><div class="val" id="jTahun">—</div></div>
      <div class="box"><div class="lbl">Nilai Stok Semasa</div><div class="val" id="nStok">—</div></div>
    </div>

    <h3 style="margin:20px 2px 10px;font-size:14px;color:var(--text-2)">UNTUNG BERSIH</h3>
    <div class="kpi">
      <div class="box"><div class="lbl">Bulan Ini</div><div class="val good" id="uBulan">—</div><div class="muted" id="bBulan" style="margin-top:4px">Belanja: —</div></div>
      <div class="box"><div class="lbl">Tahun Ini</div><div class="val good" id="uTahun">—</div><div class="muted" id="bTahun" style="margin-top:4px">Belanja: —</div></div>
    </div>

    <div style="margin-top:22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px">
      <a class="btn btn-ghost btn-sm" href="jualan.html" style="text-decoration:none">🧾 Jualan</a>
      <a class="btn btn-ghost btn-sm" href="belian.html" style="text-decoration:none">📦 Belian</a>
      <a class="btn btn-ghost btn-sm" href="perbelanjaan.html" style="text-decoration:none">💸 Belanja</a>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="olin-app.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', function(){
      if(!requireLogin()) return;
      load();
    });

    function setVal(id,v,bad){
      var el = document.getElementById(id);
      el.textContent = rm(v);
      if(typeof bad!=='undefined'){ el.classList.toggle('good', v>=0); el.classList.toggle('bad', v<0); }
    }

    function load(){
      callGAS('getDashboard', {}, function(res){
        if(res.status!=='SUCCESS'){ toast(res.message||'Gagal muat dashboard','err'); return; }
        document.getElementById('tarikh').textContent = res.tarikh || '';
        setVal('jHari', res.jualan_hari);
        setVal('jBulan', res.jualan_bulan);
        setVal('jTahun', res.jualan_tahun);
        setVal('nStok', res.nilai_stok);
        setVal('uBulan', res.untung_bersih_bulan, true);
        setVal('uTahun', res.untung_bersih_tahun, true);
        document.getElementById('bBulan').textContent = 'Belanja: ' + rm(res.belanja_bulan);
        document.getElementById('bTahun').textContent = 'Belanja: ' + rm(res.belanja_tahun);
      }, function(){ toast('Ralat sambungan','err'); });
    }
  </script>
</body>
</html>
