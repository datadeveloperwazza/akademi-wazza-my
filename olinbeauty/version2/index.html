        // Kod view ditulis semasa era tema gelap, jadi skala gray DISONGSANG
        // di sini — seluruh app bertukar tema dari SATU tempat ini sahaja:
        //   gray-900 = latar halaman & input (light gray)
        //   gray-800 = kad (putih) · gray-700 = border · gray-100 = teks utama
        // Warna accent (red/green/amber/…) shade 200-400 juga digelapkan
        // supaya teks accent kekal terbaca atas latar putih.
        colors: {
          gray: {
            950: '#ffffff', 900: '#f6f7f9', 800: '#ffffff', 700: '#e5e8ee',
            600: '#9ca3af', 500: '#6b7280', 400: '#4b5563', 300: '#374151',
            200: '#1f2937', 100: '#111827', 50: '#0b1220'
          },
          // brand = MONOCHROME (rujukan design SaaS): butang utama hitam,
          // accent teks slate gelap. Nak balik amber? 400:'#b45309' 500:'#b45309' 600:'#d97706'

          green:  { 300: '#047857', 400: '#059669', 700: '#86efac', 900: '#dcfce7' },

          orange: { 300: '#c2410c', 400: '#ea580c' },
          pink:   { 300: '#be185d', 900: '#fce7f3' },
          purple: { 300: '#7e22ce' },
          sky:    { 300: '#0369a1', 400: '#0284c7' },
          blue:   { 700: '#bfdbfe', 900: '#dbeafe' }
        }
      } }
    };
  </script>

    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    /* design pass: rujukan SaaS minimalist (kosmetik sahaja, tiada perubahan fungsi) */
    input[type="search"] { border-radius: 9999px; }
    #view .rounded-xl, #view .rounded-2xl { box-shadow: 0 1px 2px rgba(16,24,40,.05); }
    .nav-link .nav-ic { opacity: .7; }
    .nav-link:hover .nav-ic, .nav-link.text-white .nav-ic { opacity: 1; }
    .spin { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade { animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    /* logo melayang (login panel kanan) */
    .float-logo { animation: floaty 4.5s ease-in-out infinite; }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-4deg); }
      50%      { transform: translateY(-16px) rotate(-2deg); }
    }
    @media (prefers-reduced-motion: reduce) { .float-logo { animation: none; } }
    /* cetak DO — A4/A5 */
    #printArea { display: none; }
    @media print {
      body { background: #fff !important; }
      body > *:not(#printArea) { display: none !important; }
      #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100%; color: #000; font-size: 12px; padding: 16px; }
      #printArea table { width: 100%; border-collapse: collapse; }
      #printArea th, #printArea td { border: 1px solid #999; padding: 4px 6px; text-align: left; }
      #printArea .pr-right { text-align: right; }
      #printArea .pr-sign { margin-top: 48px; }
    }

  <script>
    // ===================== CONFIG / STATE =====================
    const CACHE_KEY = 'olinv2_session';
    const POST_ACTIONS = new Set([
      'login', 'logout',
      // write actions (M2+):
      'addGRN', 'addDOEjen', 'addTransfer', 'addJualanOutlet', 'addReturn', 'addPayment',
      'reallocatePayment', 'addPostage', 'voidDoc', 'voidPayment', 'createStockCount',
      'saveStockCount', 'approveStockCount', 'rejectStockCount', 'addLupus',
      'sekatBatch', 'bukaBatch',
      'submitOrderEjen', 'approveOrderEjen', 'rejectOrderEjen',
      'submitPaymentEjen', 'approvePaymentEjen', 'rejectPaymentEjen',
      'upsertProduk', 'upsertEjen', 'upsertOutlet', 'upsertStaff', 'saveSettings',
      'semakIntegriti', 'rebuildSnapshot', 'rebuildCounters', 'runBackupNow',
      'upsertAnnouncement', 'deleteAnnouncement', 'awardPoints'
    ]);

    const state = { token: null, staf: null, master: null };

    // ===================== TRANSPORT =====================
    // Semua call (baca & tulis) guna POST ke Edge Function — satu endpoint, sama interface dengan GAS.
    function callGAS(action, params) {
      params = params || {};
      const payload = Object.assign({ action }, params);
      if (state.token) payload.token = state.token;
      return fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      }).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    }

    // ===================== API CACHE =====================
    // Action baca yang selamat di-cache (TTL dalam minit). Mana-mana action TULIS
    // akan kosongkan SEMUA cache — data sentiasa fresh selepas transaksi.
    // SENGAJA TIADA: getLedger (audit — mesti live), getStockCount (sesi kiraan live).
    const CACHE_TTL_MIN = {
      getDashboard: 3, getDocList: 2, getDocDetail: 2,
      getAkaunRingkasan: 3, getStatementEjen: 3, getRingkasanBulanan: 5,
      getStock: 2, getExpiryAlerts: 3, getPosHariIni: 2, getAnomali: 3, getStaffList: 3, getLeaderboard: 3,
      getSusutStok: 5, getPrestasiProduk: 5, getBatches: 3, getAnnouncementList: 3, getOrderRequests: 2, getPaymentRequests: 2,
      getEjenPortal: 3, getMyOrders: 3, getEjenAnnouncements: 3, getEjenPoints: 3, getMyPaymentRequests: 3
    };
    const _apiCache = new Map(); // 'action|params' → { at, data }
    const CACHE_SS_KEY = 'olin_api_cache_v1';

    // Persist ke sessionStorage — cache survive F5, hilang bila tab tutup
    // (sengaja BUKAN localStorage: data kewangan tak patut kekal atas disk).
    function persistApiCache() {
      try {
        sessionStorage.setItem(CACHE_SS_KEY, JSON.stringify({
          tok: (state.token || '').slice(0, 16), e: [..._apiCache]
        }));
      } catch (e) { /* quota penuh → jalan tanpa persist */ }
    }
    function restoreApiCache() {
      try {
        const raw = sessionStorage.getItem(CACHE_SS_KEY);
        if (!raw) return;
        const o = JSON.parse(raw);
        // token lain (user lain login) → buang terus
        if (o.tok !== (state.token || '').slice(0, 16)) { sessionStorage.removeItem(CACHE_SS_KEY); return; }
        (o.e || []).forEach(([k, v]) => {
          const ttl = CACHE_TTL_MIN[k.split('|')[0]];
          if (ttl && v && Date.now() - v.at < ttl * 60000) _apiCache.set(k, v);
        });
      } catch (e) { sessionStorage.removeItem(CACHE_SS_KEY); }
    }
    function clearApiCache() {
      _apiCache.clear();
      try { sessionStorage.removeItem(CACHE_SS_KEY); } catch (e) {}
    }
    function bustCache(action) {
      [..._apiCache.keys()].forEach(k => { if (k.startsWith(action + '|')) _apiCache.delete(k); });
      persistApiCache();
    }

    async function api(action, params, opts) {
      const ttl = CACHE_TTL_MIN[action];
      const key = action + '|' + JSON.stringify(params || {});
      if (ttl && !(opts && opts.fresh)) {
        const hit = _apiCache.get(key);
        if (hit && Date.now() - hit.at < ttl * 60000) return hit.data;
      }
      const data = await callGAS(action, params);
      if (data && data.status === 'ERROR' && data.code === 'AUTH') { logoutLocal(); renderLogin(); throw new Error('AUTH'); }
      if (POST_ACTIONS.has(action)) clearApiCache(); // tulis → buang semua cache baca
      else if (ttl && data && data.status === 'SUCCESS') { _apiCache.set(key, { at: Date.now(), data }); persistApiCache(); }
      return data;
    }

    // ===================== UTIL =====================
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function rm(n) { return 'RM ' + (Number(n) || 0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function klToday() { return new Date(Date.now() + 8 * 3600000).toISOString().slice(0, 10); } // tarikh KL (UTC+8)
    function _sortBy(list, col, dir) {
      return [...list].sort((a, b) => {
        const av = a[col] ?? '', bv = b[col] ?? '';
        const cmp = (typeof av === 'number' && typeof bv === 'number') ? av - bv : String(av).localeCompare(String(bv), 'ms');
        return dir === 'asc' ? cmp : -cmp;
      });
    }
    function _th(label, col, sort, cls = '') {
      const active = sort.col === col;
      const arrow = active ? (sort.dir === 'asc' ? ' ▲' : ' ▼') : ' ⇅';
      return `<th data-sort="${col}" class="px-3 py-2 cursor-pointer select-none hover:text-gray-200${cls ? ' ' + cls : ''}"><span class="${active ? 'text-brand-400' : ''}">${label}</span><span class="ml-0.5 text-[9px] ${active ? 'text-brand-400' : 'text-gray-600'}">${arrow}</span></th>`;
    }
    function spinner(t) { return `<div class="py-12 text-center text-gray-500 text-sm"><span class="spin inline-block mr-2">⏳</span>${esc(t || 'Memuatkan…')}</div>`; }
    // ikon SVG line-style (stroke ikut currentColor — auto sesuai warna teks)

      wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
      file: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      truck: '<path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/>',
      send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
      repeat: '<path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>',
      bag: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
      undo: '<polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>',
      clipboard: '<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>',
      book: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
      settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      banknote: '<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01"/><path d="M18 12h.01"/>',
      refresh: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>',
      alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
      check: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
      lock: '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
      wrench: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>'
    };
    function ico(n, cls) { return `<svg class="${cls || 'w-[18px] h-[18px]'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICO[n] || ICO.box}</svg>`; }
    function emptyState(icon, title, sub, href, label) {
      const vis = ICO[icon]
        ? `<div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-gray-900 border border-gray-700 flex items-center justify-center text-gray-500">${ico(icon, 'w-6 h-6')}</div>`
        : `<div class="text-5xl mb-4">${icon}</div>`;
      return `<div class="max-w-xl mx-auto text-center py-16">${vis}<h2 class="text-xl font-bold text-gray-200">${esc(title)}</h2><p class="text-gray-500 mt-2 text-sm">${esc(sub)}</p>${href ? `<a href="${href}" class="inline-block mt-5 px-4 py-2 bg-brand-600 text-gray-900 font-bold rounded-lg text-sm">→ ${esc(label)}</a>` : ''}</div>`;
    }
    function prodOptGroups(list) {
      const byKat = {};
      list.forEach(p => { const k = p.kategori || 'LAIN'; (byKat[k] = byKat[k] || []).push(p); });
      return Object.keys(byKat).sort().map(k =>
        `<optgroup label="${esc(k)}">${byKat[k].map(p => `<option value="${esc(p.sku)}" data-nama="${esc(p.nama)}" data-exp="${esc(p.ada_expiry)}" data-c1="${Number(p.harga_cust_1_rm) || 0}" data-c2="${Number(p.harga_cust_2_rm) || 0}" data-e1="${Number(p.harga_ejen_1_rm) || 0}" data-e2="${Number(p.harga_ejen_2_rm) || 0}">${esc(p.sku)} — ${esc(p.nama)}</option>`).join('')}</optgroup>`
      ).join('');
    }
    function toast(msg, type) {
      const box = document.getElementById('toastBox'), wrap = document.getElementById('toast');
      box.textContent = msg;
      box.className = 'px-4 py-2.5 rounded-lg shadow-lg text-sm font-semibold ' +
        (type === 'error' ? 'bg-red-600 text-white' : type === 'warn' ? 'bg-amber-500 text-gray-900' : 'bg-green-600 text-white');
      wrap.classList.remove('hidden');
      clearTimeout(toast._t); toast._t = setTimeout(() => wrap.classList.add('hidden'), 3200);
    }
    function saveSession() { localStorage.setItem(CACHE_KEY, JSON.stringify({ token: state.token, staf: state.staf })); }
    function logoutLocal() { state.token = null; state.staf = null; state.master = null; localStorage.removeItem(CACHE_KEY); clearApiCache(); }

    // ===================== BOOT =====================
    async function boot() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return renderConfigBanner();
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        try { const s = JSON.parse(raw); state.token = s.token; state.staf = s.staf; } catch (e) {}
      }
      restoreApiCache(); // pulihkan cache API selepas F5 (token mesti padan)
      if (state.token) {
        try {
          const res = await api('getBootstrap', {});
          if (res.status === 'SUCCESS') { state.master = res; state.staf = res.staf; saveSession(); return state.staf.role === 'EJEN' ? renderEjenPortal() : renderShell(); }
        } catch (e) { if (e.message === 'AUTH') return; }
      }
      renderLogin();
    }

    function renderConfigBanner() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6">

            <code class="text-brand-400">GAS_URL</code> di bahagian atas <code>index.html</code>, kemudian muat semula.</p>
            <p class="text-xs text-gray-500 mt-3">Rujuk <code>SETUP.md</code> untuk langkah deploy.</p>
          </div>
        </div>`;
    }

    // ===================== LOGIN =====================
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex bg-gray-800">

          <div class="flex flex-col w-full lg:w-1/2 px-6 sm:px-10 lg:px-14 xl:px-20 py-8">
            <div class="flex-1 flex items-center">

                <label class="block text-xs font-medium text-gray-400 mb-1.5">PIN</label>
                <input id="inPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••••"
                  class="w-full mb-6 px-4 py-3 bg-gray-900 border border-gray-700 rounded-xl text-sm tracking-widest focus:border-brand-500 focus:ring-2 focus:ring-brand-500/10 focus:outline-none transition" />
                <button id="btnLogin"
                  class="w-full py-3 bg-brand-600 hover:bg-brand-500 text-white font-semibold text-sm rounded-xl transition">
                  Log Masuk
                </button>
              </div>
            </div>
            <p class="text-[11px] text-gray-500 leading-relaxed max-w-sm mx-auto lg:mx-0">
              Sistem Inventori Olin Beauty v2. Akses terhad kepada kakitangan yang dibenarkan sahaja.
              <span class="text-gray-400">Dibangunkan oleh Wazza Digital.</span>
            </p>
          </div>

          <!-- PANEL KANAN: visual -->

    // ===================== VIEW M6: DASHBOARD (S2) =====================
    function viewDashboard(el) {
      el.className = 'p-4 sm:p-6 fade';
      const isAdmin = state.staf.role === 'ADMIN';
      const curYear = Number(klToday().slice(0, 4));
      const MONTHS = ['Januari','Februari','Mac','April','Mei','Jun','Julai','Ogos','September','Oktober','November','Disember'];
      const MShort = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
      const years = []; for (let y = curYear; y >= 2026; y--) years.push(String(y)); if (!years.length) years.push(String(curYear));
      let _dash = null, _ring = null, _tab = isAdmin ? 'jualan' : 'stok', _year = String(curYear), _month = '';
      let _prestasi = null, _phari = 30;

      el.innerHTML = `
        <div class="w-full">
          <div class="flex items-center gap-3 mb-4 flex-wrap">
            <div id="dbBadge"></div>
            <button id="dbRefresh" class="ml-auto px-3 py-1.5 bg-gray-800 border border-gray-700 hover:border-brand-500 rounded-lg text-sm transition" title="Muat semula data terkini">↻</button>
          </div>
          ${isAdmin ? `<div class="flex gap-1 bg-gray-800 border border-gray-700 rounded-xl p-1 mb-4 w-max overflow-x-auto">
            <button class="db-tab px-4 py-1.5 rounded-lg text-sm font-semibold transition whitespace-nowrap" data-t="jualan">📈 Jualan</button>
            <button class="db-tab px-4 py-1.5 rounded-lg text-sm font-semibold transition whitespace-nowrap" data-t="stok">📦 Stok</button>
            <button class="db-tab px-4 py-1.5 rounded-lg text-sm font-semibold transition whitespace-nowrap" data-t="prestasi">📊 Prestasi Produk</button>
          </div>` : ''}
          <div id="dbBody">${spinner('Memuatkan dashboard…')}</div>
        </div>`;

      // ===== helper visual =====
      const ring = (pct, color, label) => {
        const p = Math.max(0, Math.min(100, pct));
        return `<svg viewBox="0 0 36 36" class="w-16 h-16 shrink-0">
          <path stroke="#e5e7eb" stroke-width="3.5" fill="none" d="M18 2.0845a15.9155 15.9155 0 0 1 0 31.831 15.9155 15.9155 0 0 1 0-31.831"/>
          <path stroke="${color}" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-dasharray="${p}, 100" d="M18 2.0845a15.9155 15.9155 0 0 1 0 31.831 15.9155 15.9155 0 0 1 0-31.831"/>
          <text x="18" y="19.5" text-anchor="middle" fill="#374151" style="font-size:7.5px;font-weight:800">${label}</text></svg>`;
      };
      const card = (label, val, cls, sub) => `<div class="bg-gray-800 border border-gray-700 rounded-xl p-4"><div class="text-[10px] text-gray-500 font-bold uppercase tracking-wider">${label}</div><div class="text-xl font-black ${cls || 'text-gray-100'} mt-1">${typeof val === 'number' ? rm(val) : val}</div>${sub ? `<div class="text-[11px] text-gray-500 mt-1">${sub}</div>` : ''}</div>`;
      const kad = (tajuk, rows, fmt) => rows && rows.length ? `<details open class="bg-gray-800 border border-gray-700 rounded-xl mb-3 group"><summary class="flex items-center justify-between px-4 py-3 cursor-pointer select-none list-none [&::-webkit-details-marker]:hidden"><h3 class="text-xs font-bold uppercase text-gray-500">${tajuk} <span class="text-gray-600">· ${rows.length}</span></h3><span class="text-gray-500 text-xs transition-transform group-open:rotate-90">▸</span></summary><div class="px-4 pb-3">${rows.map(fmt).join('')}</div></details>` : '';

      function scopeData() {
        const months = (_ring && _ring.bulanan) || [];
        const z = { ejen: 0, outlet: 0, ret: 0, kasar: 0, kutipan: 0, belian: 0, writeoff: 0 };
        const add = (a, m) => ({ ejen: a.ejen + +m.jualan_ejen_rm, outlet: a.outlet + +m.jualan_outlet_rm, ret: a.ret + +m.return_rm, kasar: a.kasar + +m.jualan_kasar_rm, kutipan: a.kutipan + +m.kutipan_rm, belian: a.belian + +m.belian_stok_rm, writeoff: a.writeoff + +m.write_off_rm });
        if (_month) { const m = months.find(x => x.bulan === _year + '-' + _month); return m ? add(z, m) : z; }
        return months.reduce(add, z);
      }
      function trendChart() {
        const months = (_ring && _ring.bulanan) || [];
        if (!months.length) return '<p class="text-xs text-gray-500 py-6 text-center">Tiada data jualan untuk tahun ini.</p>';
        const maxV = Math.max(1, ...months.flatMap(m => [+m.jualan_kasar_rm, +m.kutipan_rm]));
        const cols = months.map(m => {
          const mi = Number(m.bulan.slice(5, 7)) - 1, sel = m.bulan.slice(5, 7) === _month;
          const jH = Math.max(2, Math.round(+m.jualan_kasar_rm / maxV * 100)), kH = Math.max(2, Math.round(+m.kutipan_rm / maxV * 100));
          return `<div class="flex flex-col items-center justify-end gap-1 px-1 py-1 rounded-lg ${sel ? 'bg-brand-500/10' : ''}" style="min-width:2.6rem">
            <div class="flex items-end gap-1 h-32">
              <div class="w-3 rounded-t bg-green-500" style="height:${jH}%" title="Jualan ${rm(m.jualan_kasar_rm)}"></div>
              <div class="w-3 rounded-t bg-blue-500" style="height:${kH}%" title="Kutipan ${rm(m.kutipan_rm)}"></div>
            </div>
            <span class="text-[9px] ${sel ? 'text-brand-400 font-bold' : 'text-gray-500'}">${MShort[mi]}</span>
          </div>`;
        }).join('');
        return `<div class="flex items-end gap-1 overflow-x-auto pb-1">${cols}</div>
          <div class="flex items-center gap-4 justify-center mt-3 text-[10px] text-gray-500">
            <span class="flex items-center gap-1.5"><span class="w-3 h-3 rounded-sm bg-green-500"></span> Jualan</span>

          </div>`;
      }
      function expiryCard(ex) {
        if (!(ex.merah && (ex.merah.length || ex.kuning.length))) return '';
        const _today = klToday(), _todayMs = new Date(_today + 'T00:00:00').getTime();
        const dleft = e => Math.round((new Date(e + 'T00:00:00').getTime() - _todayMs) / 86400000);
        const lokShort = l => l === 'WAREHOUSE' ? 'WH' : l;

      function bawahMinCard(bawah) {
        if (!bawah || !bawah.length) return '';

            ${card('Hutang', hutang, (Number(hutang) > 0 ? 'text-red-400' : 'text-gray-100'), 'semasa')}

      // ===== render: PRESTASI PRODUK (laju / slow mover) =====
      const PRESTASI_HARI = [30, 60, 90];

    // ===================== VIEW: ORDER MASUK (ADMIN) =====================

            <td class="px-2 py-2"><input type="number" min="1" step="1" value="${l.qty}" data-i="${i}" class="om-qty w-16 px-2 py-1 bg-gray-900 border border-gray-700 rounded text-xs text-center focus:outline-none focus:border-brand-500" /></td>
            <td class="px-2 py-2"><input type="number" min="0" step="0.01" value="${Number(l.harga_rm).toFixed(2)}" data-i="${i}" class="om-harga w-24 px-2 py-1 bg-gray-900 border border-gray-700 rounded text-xs text-right focus:outline-none focus:border-brand-500" /></td>
            <td class="px-2 py-2 text-xs text-right text-gray-300 om-jumlah">${rm(Number(l.harga_rm) * l.qty)}</td>
          </tr>`).join('');
        document.getElementById('omDiskJenis').value = order.diskaun_jenis || '-';
        document.getElementById('omDiskInput').value = Number(order.diskaun_input || 0);
        document.getElementById('omPostage').value = Number(order.postage || 0);
        document.getElementById('omCatatan').textContent = order.catatan || '—';
        document.getElementById('omRejectReason').value = '';
        document.getElementById('omRejectRow').classList.add('hidden');
        document.getElementById('omBtn').classList.remove('hidden');
        document.getElementById('omModal').classList.remove('hidden');
        // live jumlah update
        document.querySelectorAll('.om-qty, .om-harga').forEach(inp => {
          inp.oninput = () => {
            const row = inp.closest('tr');
            const qty = parseFloat(row.querySelector('.om-qty').value) || 0;
            const harga = parseFloat(row.querySelector('.om-harga').value) || 0;
            row.querySelector('.om-jumlah').textContent = rm(qty * harga);
          };
        });
        document.getElementById('omApprove').onclick = () => doApprove(false);
        document.getElementById('omReject').onclick = () => {
          const row = document.getElementById('omRejectRow');
          row.classList.toggle('hidden');
          if (!row.classList.contains('hidden')) document.getElementById('omRejectReason').focus();
          else doReject();
        };
        document.getElementById('omConfirmReject').onclick = doReject;
      }

      function gatherLines() {
        return Array.from(document.querySelectorAll('#omLines tr')).map(tr => {
          const sku = tr.cells[0].textContent.trim();
          const nama = tr.cells[1].textContent.trim();
          const qty = parseFloat(tr.querySelector('.om-qty').value) || 0;
          const harga_rm = parseFloat(tr.querySelector('.om-harga').value) || 0;
          return { sku, nama, qty, harga_rm };
        }).filter(l => l.qty > 0);
      }

      async function doApprove() {
        const btn = document.getElementById('omApprove');
        btn.disabled = true; btn.textContent = 'Memproses…';
        const lines = gatherLines();
        if (!lines.length) { toast('Tiada baris valid.', 'error'); btn.disabled = false; btn.textContent = 'Luluskan'; return; }
        const dj = document.getElementById('omDiskJenis').value;
        const payload = { order_id: _activeOrder.order_id, lines, diskaun_jenis: dj, diskaun_input: dj === '-' ? 0 : (parseFloat(document.getElementById('omDiskInput').value) || 0), postage: parseFloat(document.getElementById('omPostage').value) || 0 };
        try {
          const res = await api('approveOrderEjen', payload);
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal lulus.', 'error'); return; }
          toast(`Order diluluskan — ${res.doc_no}`);
          document.getElementById('omModal').classList.add('hidden');
          loadOrders();
        } catch { toast('Tak dapat sambung.', 'error'); }
        finally { btn.disabled = false; btn.textContent = 'Luluskan'; }
      }

      async function doReject() {
        const reason = document.getElementById('omRejectReason').value.trim();
        if (!reason) { toast('Sila isi sebab tolak.', 'error'); return; }
        const btn = document.getElementById('omConfirmReject');
        btn.disabled = true;
        try {
          const res = await api('rejectOrderEjen', { order_id: _activeOrder.order_id, catatan: reason });
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal.', 'error'); return; }
          toast('Order ditolak.');
          document.getElementById('omModal').classList.add('hidden');
          loadOrders();
        } catch { toast('Tak dapat sambung.', 'error'); }
        finally { btn.disabled = false; }
      }

      function renderList() {
        const tbody = document.getElementById('omBody');
        if (!_orders.length) { tbody.innerHTML = `<tr><td colspan="6" class="py-8 text-center text-gray-500 text-sm">Tiada order ${_filterStatus.toLowerCase()}.</td></tr>`; return; }
        tbody.innerHTML = _orders.map(o => `
          <tr class="border-b border-gray-700/40 hover:bg-gray-900/30 transition cursor-pointer om-row" data-id="${esc(o.order_id)}">
            <td class="px-3 py-3 text-xs font-mono text-gray-500">${esc(o.order_id)}</td>
            <td class="px-3 py-3"><p class="text-sm font-semibold text-gray-100">${esc(o.ejen_nama || o.ejen_id)}</p><p class="text-[10px] text-gray-500">${esc(o.ejen_id)}</p></td>
            <td class="px-3 py-3 text-xs text-gray-400">${esc(o.tarikh)}</td>
            <td class="px-3 py-3 text-xs text-gray-400">${(Array.isArray(o.lines) ? o.lines : JSON.parse(o.lines || '[]')).length} produk</td>
            <td class="px-3 py-3 text-sm font-bold text-gray-100 text-right">${rm(o.jumlah_rm)}</td>
            <td class="px-3 py-3 text-right">${statusBadge(o.status)}</td>
          </tr>`).join('');
        document.querySelectorAll('.om-row').forEach(row => {
          row.onclick = () => { const o = _orders.find(x => x.order_id === row.dataset.id); if (o && o.status === 'PENDING') openModal(o); };
        });
      }

      async function loadOrders() {
        document.getElementById('omBody').innerHTML = `<tr><td colspan="6" class="py-6 text-center text-xs text-gray-500">${spinner()}</td></tr>`;
        const res = await api('getOrderRequests', { status: _filterStatus });
        if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal muat.', 'error'); return; }
        _orders = res.orders || [];
        renderList();
      }

      el.innerHTML = `
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="text-base font-bold text-gray-100">Order Masuk</h2>
          <div class="flex gap-1 bg-gray-900 border border-gray-700 rounded-lg p-0.5 text-xs">
            ${[['PENDING','Pending'],['APPROVED','Approved'],['REJECTED','Rejected'],['SEMUA','Semua']].map(([v,l])=>`<button class="om-ftab px-3 py-1.5 rounded-md transition" data-v="${v}">${l}</button>`).join('')}
          </div>
        </div>
        <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden">
          <table class="w-full text-left">
            <thead><tr class="border-b border-gray-700 text-[10px] uppercase text-gray-500">
              <th class="px-3 py-2.5">ID</th><th class="px-3 py-2.5">Ejen</th><th class="px-3 py-2.5">Tarikh</th>
              <th class="px-3 py-2.5">Item</th><th class="px-3 py-2.5 text-right">Jumlah</th><th class="px-3 py-2.5 text-right">Status</th>
            </tr></thead>
            <tbody id="omBody"></tbody>
          </table>
        </div>

        <!-- Approve/Reject Modal -->
        <div id="omModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
          <div class="absolute inset-0 bg-black/50" id="omScrim"></div>
          <div class="relative bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-2xl shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between p-5 border-b border-gray-700 shrink-0">
              <h3 id="omTitle" class="font-bold text-gray-100 text-sm"></h3>
              <button id="omClose" class="text-gray-500 hover:text-gray-300 text-xl">×</button>
            </div>
            <div class="overflow-y-auto flex-1 p-5 space-y-4">
              <div class="overflow-x-auto">
                <table class="w-full text-left min-w-[400px]">
                  <thead><tr class="text-[10px] uppercase text-gray-500 border-b border-gray-700">
                    <th class="px-2 py-1.5">SKU</th><th class="px-2 py-1.5">Nama</th>
                    <th class="px-2 py-1.5 text-center">Qty</th><th class="px-2 py-1.5 text-right">Harga</th><th class="px-2 py-1.5 text-right">Jumlah</th>
                  </tr></thead>
                  <tbody id="omLines"></tbody>
                </table>
              </div>
              <div class="grid grid-cols-3 gap-3">
                <div><label class="text-xs text-gray-500 mb-1 block">Diskaun</label>
                  <select id="omDiskJenis" class="w-full px-2 py-1.5 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:outline-none">
                    <option value="-">Tiada</option><option value="RM">RM</option><option value="%">%</option>
                  </select></div>
                <div><label class="text-xs text-gray-500 mb-1 block">Nilai Diskaun</label>
                  <input id="omDiskInput" type="number" step="0.01" min="0" value="0" class="w-full px-2 py-1.5 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:outline-none" /></div>
                <div><label class="text-xs text-gray-500 mb-1 block">Postage (RM)</label>
                  <input id="omPostage" type="number" step="0.01" min="0" value="0" class="w-full px-2 py-1.5 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:outline-none" /></div>
              </div>
              <div><label class="text-xs text-gray-500 mb-1 block">Catatan Ejen</label>
                <p id="omCatatan" class="text-xs text-gray-300 bg-gray-900 rounded-lg px-3 py-2 min-h-[32px]"></p></div>
              <div id="omRejectRow" class="hidden">
                <label class="text-xs text-gray-500 mb-1 block">Sebab Tolak *</label>
                <input id="omRejectReason" type="text" placeholder="Contoh: Stok tidak mencukupi" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:outline-none focus:border-red-500" />
                <button id="omConfirmReject" class="mt-2 w-full py-2 bg-red-600 hover:bg-red-500 text-white text-sm font-semibold rounded-xl">Confirm Tolak</button>
              </div>
            </div>
            <div id="omBtn" class="flex justify-between gap-3 p-5 border-t border-gray-700 shrink-0">
              <button id="omReject" class="px-5 py-2 text-sm bg-red-900/30 hover:bg-red-900/50 border border-red-800/40 text-red-400 font-semibold rounded-xl">Tolak</button>
              <button id="omApprove" class="px-6 py-2 text-sm bg-gray-100 text-white font-bold rounded-xl hover:bg-gray-200 transition">Luluskan →</button>
            </div>
          </div>
        </div>`;

      document.getElementById('omClose').onclick = () => document.getElementById('omModal').classList.add('hidden');
      document.getElementById('omScrim').onclick = () => document.getElementById('omModal').classList.add('hidden');
      document.querySelectorAll('.om-ftab').forEach(b => {
        b.onclick = () => { _filterStatus = b.dataset.v; document.querySelectorAll('.om-ftab').forEach(x => { x.classList.toggle('bg-gray-100', x===b); x.classList.toggle('text-white', x===b); x.classList.toggle('font-semibold', x===b); x.classList.toggle('text-gray-500', x!==b); }); loadOrders(); };
        if (b.dataset.v === _filterStatus) { b.classList.add('bg-gray-100','text-white','font-semibold'); } else { b.classList.add('text-gray-500'); }
      });
      loadOrders();
    }

    // ===================== VIEW: BAYARAN MASUK (ADMIN) =====================
    function viewBayaranMasuk(el) {
      el.className = 'p-4 sm:p-6 fade';
      let _reqs = [], _filter = 'PENDING', _active = null;

      el.innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
          <h2 class="text-lg font-bold text-gray-100">Bayaran Masuk</h2>
          <div class="flex gap-1 bg-gray-800 border border-gray-700 rounded-lg p-1 text-xs">
            ${[['PENDING','Menunggu'],['APPROVED','Diluluskan'],['REJECTED','Ditolak'],['SEMUA','Semua']].map(([v,l])=>`<button class="bm-ftab px-3 py-1.5 rounded-md transition" data-v="${v}">${l}</button>`).join('')}
          </div>
        </div>
        <div id="bmList"><div class="py-12 text-center text-gray-500 text-sm"><span class="spin inline-block mr-2">⏳</span>Memuatkan…</div></div>
        <div id="bmModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4"></div>`;

      async function loadReqs() {
        document.getElementById('bmList').innerHTML = `<div class="py-12 text-center text-gray-500 text-sm"><span class="spin inline-block mr-2">⏳</span>Memuatkan…</div>`;
        try {
          const res = await api('getPaymentRequests', { status: _filter });
          if (res.status !== 'SUCCESS') { document.getElementById('bmList').innerHTML = `<p class="text-red-400 text-sm">${esc(res.message||'Gagal.')}</p>`; return; }
          _reqs = res.requests || [];
          renderList();
        } catch { document.getElementById('bmList').innerHTML = `<p class="text-red-400 text-sm">Tak dapat sambung.</p>`; }
      }

      function badge(s) {
        return s === 'PENDING' ? `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-500/15 text-amber-400">MENUNGGU</span>`
             : s === 'APPROVED' ? `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-green-500/15 text-green-400">DILULUSKAN</span>`
             : `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-red-500/15 text-red-400">DITOLAK</span>`;
      }

      function renderList() {
        const box = document.getElementById('bmList');
        if (!_reqs.length) { box.innerHTML = `<div class="bg-gray-800 border border-gray-700 rounded-xl p-8 text-center text-gray-500 text-sm">Tiada permohonan.</div>`; return; }
        box.innerHTML = `<div class="space-y-2">${_reqs.map(r => `
          <div class="bm-row bg-gray-800 border border-gray-700 rounded-xl p-4 flex items-center justify-between gap-3 ${r.status==='PENDING'?'cursor-pointer hover:border-gray-600':''} transition" data-id="${esc(r.preq_id)}">
            <div class="min-w-0">
              <p class="text-sm font-semibold text-gray-100">${esc(r.ejen_nama)} <span class="text-gray-500 font-normal text-xs">${esc(r.ejen_id)}</span></p>
              <p class="text-xs text-gray-500 mt-0.5">${esc(r.tarikh)} · ${esc(r.kaedah)}${r.doc_no_target?' · '+esc(r.doc_no_target):''}${r.rujukan_resit?' · ref '+esc(r.rujukan_resit):''}</p>
            </div>
            <div class="text-right shrink-0">
              <p class="text-base font-bold text-gray-100">${rm(r.amaun_rm)}</p>
              <div class="mt-0.5">${badge(r.status)}</div>
            </div>
          </div>`).join('')}</div>`;
        box.querySelectorAll('.bm-row[data-id]').forEach(row => {
          const r = _reqs.find(x => x.preq_id === row.dataset.id);
          if (r && r.status === 'PENDING') row.onclick = () => openModal(r);
          else row.onclick = () => openModal(r, true);
        });
      }

      function openModal(r, readOnly) {
        _active = r;
        const modal = document.getElementById('bmModal');
        modal.classList.remove('hidden');
        modal.onclick = (e) => { if (e.target === modal) modal.classList.add('hidden'); };
        modal.innerHTML = `<div class="bg-gray-900 border border-gray-700 rounded-2xl max-w-md w-full max-h-[88vh] overflow-y-auto p-5">
          <div class="flex items-center justify-between mb-3">
            <div><p class="text-sm font-bold text-gray-100">${esc(r.ejen_nama)} <span class="text-gray-500 text-xs">${esc(r.ejen_id)}</span></p><p class="text-[10px] text-gray-500 font-mono">${esc(r.preq_id)}</p></div>
            <button id="bmClose" class="text-gray-500 hover:text-gray-300 text-2xl leading-none">×</button>
          </div>
          <p class="text-center text-3xl font-black text-gray-100 mb-3">${rm(r.amaun_rm)}</p>
          <div class="text-sm space-y-1 mb-3">
            <div class="flex justify-between"><span class="text-gray-500">Tarikh</span><span class="text-gray-200">${esc(r.tarikh)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Kaedah</span><span class="text-gray-200">${esc(r.kaedah)}</span></div>
            <div class="flex justify-between"><span class="text-gray-500">Untuk DO</span><span class="text-gray-200">${r.doc_no_target?esc(r.doc_no_target):'Auto-agih'}</span></div>
            ${r.rujukan_resit?`<div class="flex justify-between"><span class="text-gray-500">Rujukan</span><span class="text-gray-200">${esc(r.rujukan_resit)}</span></div>`:''}
            ${r.catatan?`<div class="flex justify-between"><span class="text-gray-500">Catatan</span><span class="text-gray-200 text-right">${esc(r.catatan)}</span></div>`:''}
            <div class="flex justify-between"><span class="text-gray-500">Status</span><span>${badge(r.status)}</span></div>
            ${r.status==='APPROVED'&&r.pay_no?`<div class="flex justify-between"><span class="text-gray-500">Bayaran</span><span class="text-green-400 font-mono">${esc(r.pay_no)}</span></div>`:''}
            ${r.status==='REJECTED'&&r.catatan_admin?`<div class="flex justify-between"><span class="text-gray-500">Sebab tolak</span><span class="text-red-400 text-right">${esc(r.catatan_admin)}</span></div>`:''}
          </div>
          ${r.bukti_url?`<a href="${esc(r.bukti_url)}" target="_blank"><img src="${esc(r.bukti_url)}" class="w-full rounded-lg border border-gray-700 mb-3" /></a>`:`<p class="text-xs text-gray-600 text-center py-3 border border-gray-700 rounded-lg mb-3">Tiada bukti slip</p>`}
          ${!readOnly && r.status==='PENDING' ? `
          <div class="mb-3"><label class="text-xs text-gray-500 mb-1 block">Amaun untuk diluluskan (boleh laras)</label>
            <input id="bmAmaun" type="number" min="0" step="0.01" value="${Number(r.amaun_rm).toFixed(2)}" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none" /></div>
          <div id="bmRejectRow" class="hidden mb-3"><input id="bmRejectReason" type="text" placeholder="Sebab tolak…" class="w-full px-3 py-2 bg-gray-800 border border-red-500/40 rounded-lg text-sm focus:outline-none" /></div>
          <div class="flex gap-2">
            <button id="bmReject" class="flex-1 py-2.5 bg-red-500/10 border border-red-500/40 text-red-300 font-bold text-sm rounded-lg hover:bg-red-500/20">Tolak</button>
            <button id="bmApprove" class="flex-1 py-2.5 bg-gray-100 text-white font-bold text-sm rounded-lg hover:bg-gray-200">Luluskan →</button>
          </div>`:''}
        </div>`;
        document.getElementById('bmClose').onclick = () => modal.classList.add('hidden');
        if (!readOnly && r.status === 'PENDING') {
          document.getElementById('bmApprove').onclick = doApprove;
          document.getElementById('bmReject').onclick = () => {
            const row = document.getElementById('bmRejectRow');
            row.classList.toggle('hidden');
            if (!row.classList.contains('hidden')) document.getElementById('bmRejectReason').focus();
            else doReject();
          };
        }
      }

      async function doApprove() {
        const btn = document.getElementById('bmApprove'); btn.disabled = true; btn.textContent = 'Memproses…';
        const amaun = parseFloat(document.getElementById('bmAmaun').value) || 0;
        if (amaun <= 0) { toast('Amaun tidak sah.', 'error'); btn.disabled = false; btn.textContent = 'Luluskan →'; return; }
        try {
          const res = await api('approvePaymentEjen', { preq_id: _active.preq_id, amaun });
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal lulus.', 'error'); btn.disabled = false; btn.textContent = 'Luluskan →'; return; }
          toast(`Bayaran diluluskan — ${res.pay_no || ''}`);
          document.getElementById('bmModal').classList.add('hidden');
          loadReqs();
        } catch { toast('Tak dapat sambung.', 'error'); btn.disabled = false; btn.textContent = 'Luluskan →'; }
      }
      async function doReject() {
        const sebab = document.getElementById('bmRejectReason').value.trim();
        if (sebab.length < 3) { toast('Sila isi sebab tolak.', 'error'); return; }
        try {
          const res = await api('rejectPaymentEjen', { preq_id: _active.preq_id, catatan: sebab });
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal tolak.', 'error'); return; }
          toast('Permohonan ditolak.');
          document.getElementById('bmModal').classList.add('hidden');
          loadReqs();
        } catch { toast('Tak dapat sambung.', 'error'); }
      }

      document.querySelectorAll('.bm-ftab').forEach(b => {
        b.classList.add('text-gray-500');
        b.onclick = () => {
          _filter = b.dataset.v;
          document.querySelectorAll('.bm-ftab').forEach(x => x.classList.remove('bg-gray-100','text-white','font-semibold','text-gray-500'));
          document.querySelectorAll('.bm-ftab').forEach(x => { if (x.dataset.v === _filter) x.classList.add('bg-gray-100','text-white','font-semibold'); else x.classList.add('text-gray-500'); });
          loadReqs();
        };
      });
      document.querySelectorAll('.bm-ftab').forEach(b => { if (b.dataset.v === _filter) { b.classList.remove('text-gray-500'); b.classList.add('bg-gray-100','text-white','font-semibold'); } });
      loadReqs();
    }

    // ===================== VIEW: SUSUT STOK (ADMIN) =====================
    function viewSusutStok(el) {
      el.className = 'p-4 sm:p-6 fade';
      const rmf = n => 'RM ' + Number(n).toFixed(2);
      let _bulan = new Date().toISOString().slice(0, 7), _data = null, _filter = 'SEMUA';
      el.innerHTML = `
        <div class="flex items-center justify-between flex-wrap gap-3 mb-4">
          <div><h2 class="text-lg font-bold text-gray-100">Laporan Susut Stok</h2>
            <p class="text-xs text-gray-500">Nilai kerugian dari kiraan stok (ADJ) + pelupusan rosak (Lupus).</p></div>
          <div class="flex items-center gap-2">
            <input id="ssBulan" type="month" value="${_bulan}" class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:outline-none" />
            <button id="ssRefresh" class="px-3 py-2 bg-gray-700 hover:bg-gray-600/30 rounded-lg text-sm" title="Muat semula">↻</button>
          </div>
        </div>
        <div id="ssBody">${spinner('Memuatkan…')}</div>`;

      async function load(force) {
        document.getElementById('ssBody').innerHTML = spinner('Memuatkan…');
        try {
          const res = await api('getSusutStok', { bulan: _bulan }, force ? { fresh: true } : undefined);
          if (res.status !== 'SUCCESS') { document.getElementById('ssBody').innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal.')}</p>`; return; }
          _data = res; render();
        } catch { document.getElementById('ssBody').innerHTML = `<p class="text-red-400 text-sm">Tak dapat sambung.</p>`; }
      }

      function render() {
        const d = _data; if (!d) return;
        const card = (label, val, cls) => `<div class="bg-gray-800 border border-gray-700 rounded-2xl p-4"><p class="text-[10px] uppercase tracking-wider text-gray-500 mb-1">${label}</p><p class="text-xl font-black ${cls || 'text-gray-100'}">${rmf(val)}</p></div>`;

    // ===================== VIEW: PENGUMUMAN (ADMIN) =====================
    function viewPengumuman(el) {
      el.className = 'p-4 sm:p-6 fade';
      const SASARAN_OPTS = ['SEMUA','EJEN','WAREHOUSE','ADMIN'];
      let _annList = [], _editId = null, _filterStatus = 'SEMUA', _sort = { col: 'created_at', dir: 'desc' };

      function openForm(ann = null) {
        _editId = ann ? ann.ann_id : null;
        const today = klToday();
        document.getElementById('annFormTitle').textContent = ann ? 'Edit Pengumuman' : 'Pengumuman Baru';
        document.getElementById('annTajuk').value = ann?.tajuk || '';
        document.getElementById('annIsi').value = ann?.isi || '';
        document.getElementById('annMula').value = ann?.tarikh_mula || today;
        document.getElementById('annTamat').value = ann?.tarikh_tamat || '';
        document.getElementById('annSasaran').value = ann?.sasaran || 'SEMUA';
        document.getElementById('annStatus').value = ann?.status || 'AKTIF';
        document.getElementById('annStatusRow').style.display = ann ? '' : 'none';
        document.getElementById('annModal').classList.remove('hidden');
      }

      function closeForm() { document.getElementById('annModal').classList.add('hidden'); _editId = null; }

      function statusBadge(s) {
        return s === 'AKTIF'
          ? `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-green-500/15 text-green-400">AKTIF</span>`
          : `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-gray-700 text-gray-400">TIDAK AKTIF</span>`;
      }

      function _th(label, col, extraCls = '') {
        const active = _sort.col === col;
        const arrow = active ? (_sort.dir === 'asc' ? ' ↑' : ' ↓') : '';
        return `<th class="px-3 py-2.5 cursor-pointer select-none hover:text-gray-300 transition ann-th ${active ? 'text-gray-200' : ''} ${extraCls}" data-col="${col}">${label}${arrow}</th>`;
      }

      function _filtered() {
        let list = _filterStatus === 'SEMUA' ? _annList : _annList.filter(a => a.status === _filterStatus);
        return [...list].sort((a, b) => {
          const av = String(a[_sort.col] ?? ''), bv = String(b[_sort.col] ?? '');
          return _sort.dir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
        });
      }

      function renderList() {
        document.querySelectorAll('.ann-ftab').forEach(b => {
          const on = b.dataset.f === _filterStatus;
          b.classList.toggle('bg-gray-100', on); b.classList.toggle('text-white', on);
          b.classList.toggle('font-semibold', on); b.classList.toggle('text-gray-500', !on);

        const thead = document.getElementById('annThead');
        thead.innerHTML = `<tr class="border-b border-gray-700 text-[10px] uppercase text-gray-500">
          ${_th('ID','ann_id')}${_th('Tajuk','tajuk')}${_th('Tarikh Mula','tarikh_mula')}
          ${_th('Sasaran','sasaran')}${_th('Status','status')}${_th('Dicipta','created_at')}
          <th class="px-3 py-2.5 text-right">Tindakan</th></tr>`;
        thead.querySelectorAll('.ann-th').forEach(th => {
          th.onclick = () => {
            _sort = _sort.col === th.dataset.col ? { col: _sort.col, dir: _sort.dir === 'asc' ? 'desc' : 'asc' } : { col: th.dataset.col, dir: 'desc' };
            renderList();
          };
        });
        const list = _filtered();
        const tbody = document.getElementById('annBody');
        if (!list.length) {
          tbody.innerHTML = `<tr><td colspan="7" class="py-8 text-center text-gray-500 text-sm">Tiada pengumuman${_filterStatus !== 'SEMUA' ? ' ' + _filterStatus.replace('_',' ').toLowerCase() : ''} lagi.</td></tr>`;
          return;
        }
        tbody.innerHTML = list.map(a => `
          <tr class="border-b border-gray-700/40 hover:bg-gray-900/30 transition">
            <td class="px-3 py-3 text-xs font-mono text-gray-500 whitespace-nowrap">${esc(a.ann_id)}</td>
            <td class="px-3 py-3 w-52 max-w-[208px]">
              <p class="text-sm font-semibold text-gray-100 truncate">${esc(a.tajuk)}</p>
              <p class="text-xs text-gray-500 mt-0.5 truncate">${esc(a.isi)}</p>
            </td>
            <td class="px-3 py-3 text-xs text-gray-400 whitespace-nowrap">${esc(a.tarikh_mula)}${a.tarikh_tamat ? ' <span class="text-gray-600">→</span> ' + esc(a.tarikh_tamat) : ''}</td>
            <td class="px-3 py-3 text-xs text-gray-400 whitespace-nowrap">${esc(a.sasaran)}</td>
            <td class="px-3 py-3 whitespace-nowrap">${statusBadge(a.status)}</td>
            <td class="px-3 py-3 text-xs text-gray-500 whitespace-nowrap">${a.created_at ? esc(String(a.created_at).slice(0,10)) : '—'}</td>
            <td class="px-3 py-3 text-right whitespace-nowrap">
              <button data-id="${esc(a.ann_id)}" class="ann-edit px-2.5 py-1 text-xs bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-lg mr-1">Edit</button>
              <button data-id="${esc(a.ann_id)}" class="ann-del px-2.5 py-1 text-xs bg-red-900/30 hover:bg-red-900/50 border border-red-800/40 text-red-400 rounded-lg">Padam</button>
            </td>
          </tr>`).join('');
        tbody.querySelectorAll('.ann-edit').forEach(b => {
          b.onclick = () => { const a = _annList.find(x => x.ann_id === b.dataset.id); if (a) openForm(a); };
        });
        tbody.querySelectorAll('.ann-del').forEach(b => {
          b.onclick = async () => {
            if (!confirm('Nyahaktifkan pengumuman ini?')) return;
            const res = await api('deleteAnnouncement', { ann_id: b.dataset.id });
            if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal.', 'error'); return; }
            toast('Pengumuman dipadamkan.');
            loadList();
          };
        });
      }

      async function loadList() {
        document.getElementById('annBody').innerHTML = `<tr><td colspan="7" class="py-6 text-center text-xs text-gray-500">${spinner()}</td></tr>`;
        const res = await api('getAnnouncementList', {});
        if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal muat.', 'error'); return; }
        _annList = res.announcements || [];
        renderList();
      }

      el.innerHTML = `
        <div class="flex items-center justify-between mb-5 flex-wrap gap-3">
          <h2 class="text-base font-bold text-gray-100">Pengumuman</h2>
          <div class="flex items-center gap-2 flex-wrap">
            <div class="flex gap-1 bg-gray-900 border border-gray-700 rounded-lg p-0.5 text-xs">
              ${[['SEMUA','Semua'],['AKTIF','Aktif'],['TIDAK_AKTIF','Tidak Aktif']].map(([v,l])=>`<button class="ann-ftab px-3 py-1.5 rounded-md transition" data-f="${v}">${l}</button>`).join('')}
            </div>
            <button id="annNew" class="px-4 py-2 bg-gray-100 text-white text-sm font-semibold rounded-xl hover:bg-gray-200 transition">+ Pengumuman Baru</button>

        <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden overflow-x-auto">
          <table class="w-full text-left min-w-[750px]">
            <thead id="annThead"></thead>
            <tbody id="annBody"></tbody>
          </table>
        </div>

        <!-- Modal Form -->
        <div id="annModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
          <div class="absolute inset-0 bg-black/50" id="annScrim"></div>
          <div class="relative bg-gray-800 border border-gray-700 rounded-2xl w-full max-w-lg shadow-2xl">
            <div class="flex items-center justify-between p-5 border-b border-gray-700">
              <h3 id="annFormTitle" class="font-bold text-gray-100">Pengumuman Baru</h3>
              <button id="annClose" class="text-gray-500 hover:text-gray-300 text-xl leading-none">×</button>
            </div>
            <div class="p-5 space-y-4">
              <div>
                <label class="text-xs text-gray-500 mb-1 block">Tajuk *</label>
                <input id="annTajuk" type="text" placeholder="Contoh: Promosi Raya Jun 2026" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:border-brand-500 focus:outline-none" />
              </div>
              <div>
                <label class="text-xs text-gray-500 mb-1 block">Isi Pengumuman *</label>
                <textarea id="annIsi" rows="4" placeholder="Tulis kandungan pengumuman di sini…" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:border-brand-500 focus:outline-none resize-none"></textarea>

              <div class="grid grid-cols-2 gap-3">

                  <input id="annMula" type="date" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:border-brand-500 focus:outline-none" />

              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="text-xs text-gray-500 mb-1 block">Sasaran</label>
                  <select id="annSasaran" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:border-brand-500 focus:outline-none">
                    ${SASARAN_OPTS.map(s => `<option value="${s}">${s}</option>`).join('')}

                <div id="annStatusRow">
                  <label class="text-xs text-gray-500 mb-1 block">Status</label>
                  <select id="annStatus" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:border-brand-500 focus:outline-none">
                    <option value="AKTIF">AKTIF</option>

                  </select>
                </div>
              </div>

            <div class="flex justify-end gap-2 p-5 border-t border-gray-700">
              <button id="annCancel" class="px-4 py-2 text-sm bg-gray-700 hover:bg-gray-600 rounded-xl">Batal</button>
              <button id="annSave" class="px-5 py-2 text-sm bg-gray-100 text-white font-semibold rounded-xl hover:bg-gray-200 transition">Simpan</button>
            </div>
          </div>
        </div>`;

      document.querySelectorAll('.ann-ftab').forEach(b => {
        b.onclick = () => { _filterStatus = b.dataset.f; renderList(); };
      });
      document.getElementById('annNew').onclick = () => openForm();
      document.getElementById('annClose').onclick = closeForm;
      document.getElementById('annCancel').onclick = closeForm;
      document.getElementById('annScrim').onclick = closeForm;
      document.getElementById('annSave').onclick = async () => {
        const btn = document.getElementById('annSave');
        const tajuk = document.getElementById('annTajuk').value.trim();
        const isi = document.getElementById('annIsi').value.trim();
        if (!tajuk || !isi) { toast('Tajuk dan isi wajib diisi.', 'error'); return; }
        btn.disabled = true; btn.textContent = 'Menyimpan…';
        const ann = {
          ann_id: _editId || '',
          tajuk, isi,
          tarikh_mula: document.getElementById('annMula').value || klToday(),
          tarikh_tamat: document.getElementById('annTamat').value || '',
          sasaran: document.getElementById('annSasaran').value,
          status: document.getElementById('annStatus').value,
        };
        try {

          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal simpan.', 'error'); return; }
          toast(_editId ? 'Pengumuman dikemaskini.' : 'Pengumuman ditambah.');
          closeForm();
          loadList();

        finally { btn.disabled = false; btn.textContent = 'Simpan'; }

                  <div class="text-[10px] text-gray-500">hutang semasa</div>

              </div>

      // ---------- VOID bayaran ----------
      function doVoidPayment(payNo, ejenId) {
        const sebab = prompt('Sebab batal bayaran ' + payNo + ':');
        if (sebab === null) return;
        if (!sebab.trim()) { toast('Sebab diperlukan.', 'warn'); return; }
        api('voidPayment', { pay_no: payNo, sebab: sebab.trim() }).then(res => {
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal batal.', 'error'); return; }
          toast('Bayaran ' + payNo + ' dibatalkan.');
          openStatement(ejenId);
        }).catch(() => toast('Gagal sambung pelayan.', 'error'));
      }

      // ---------- LEVEL 3: modal bayaran ----------
      let payClientRef = null;
      function openPayModal(st, dosUnpaid) {
        payClientRef = null;
        const wrap = document.createElement('div');
        wrap.id = 'payModal';
        wrap.className = 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70';
        wrap.innerHTML = `
          <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-lg max-h-[92vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-700">
              <h3 class="font-bold">Terima Bayaran — ${esc(st.ejen.nama)}</h3>
              <button id="payClose" class="text-gray-500 hover:text-gray-300 text-xl">×</button>
            </div>
            <div class="p-5 space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs text-gray-400 mb-1">Amaun (RM) *</label>
                  <input id="payAmaun" type="number" step="0.01" min="0" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" placeholder="0.00" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Kaedah *</label>
                  <select id="payKaedah" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none">
                    <option value="TUNAI">Tunai</option><option value="TRANSFER">Transfer</option><option value="CHEQUE">Cheque</option>
                  </select></div>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs text-gray-400 mb-1">Tarikh</label>
                  <input id="payTarikh" type="date" value="${klToday()}" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Rujukan resit</label>
                  <input id="payRujukan" type="text" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" placeholder="cth MBB-8821" /></div>
              </div>

              <div>
                <div class="flex items-center justify-between mb-1">
                  <label class="block text-xs text-gray-400">Agihan ke DO (tertua dulu)</label>
                  <button id="payAuto" class="text-[11px] text-brand-400 hover:underline">↻ Auto-agih</button>
                </div>
                <div id="payDOs" class="space-y-1.5 max-h-52 overflow-y-auto">
                  ${dosUnpaid.length ? dosUnpaid.map(d => `
                    <div class="flex items-center gap-2 text-sm">
                      <div class="flex-1 min-w-0">
                        <span class="font-mono text-xs text-brand-400">${esc(d.doc_no)}</span>
                        <span class="text-[11px] text-gray-500">baki ${rm(d.baki_rm)}</span>
                      </div>
                      <input type="number" step="0.01" min="0" max="${d.baki_rm}" data-doc="${esc(d.doc_no)}" data-baki="${d.baki_rm}"
                        class="pay-alloc w-24 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-sm text-right focus:border-brand-500 focus:outline-none" placeholder="0.00" />
                    </div>`).join('') : '<div class="text-xs text-gray-500 py-2">Tiada DO tertunggak — bayaran akan jadi deposit kredit (perlu Admin).</div>'}
                </div>
              </div>

              <div id="payOverflow" class="hidden text-xs"></div>
              <div><label class="block text-xs text-gray-400 mb-1">Catatan <span class="text-gray-600">(opt)</span></label>
                <input id="payCatatan" type="text" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
              <div id="payErr" class="hidden text-red-400 text-xs"></div>
              <button id="paySave" class="w-full py-2.5 bg-brand-600 hover:bg-brand-500 text-gray-900 font-bold rounded-lg transition">Simpan Bayaran</button>
            </div>
          </div>`;
        el.appendChild(wrap);

        const amaunEl = document.getElementById('payAmaun');
        const allocEls = () => Array.from(wrap.querySelectorAll('.pay-alloc'));

        function autoAgih() {
          let remain = Math.round((parseFloat(amaunEl.value) || 0) * 100);
          allocEls().forEach(inp => {
            const baki = Math.round((parseFloat(inp.dataset.baki) || 0) * 100);
            const take = Math.max(0, Math.min(baki, remain));
            inp.value = take ? (take / 100).toFixed(2) : '';
            remain -= take;
          });
          recompute();
        }
        function recompute() {
          const amaun = Math.round((parseFloat(amaunEl.value) || 0) * 100);
          let alloc = 0;
          allocEls().forEach(inp => { alloc += Math.round((parseFloat(inp.value) || 0) * 100); });
          const over = amaun - alloc;
          const ov = document.getElementById('payOverflow');
          if (amaun <= 0) { ov.classList.add('hidden'); return; }
          if (over > 0) { ov.className = 'text-xs text-brand-400'; ov.textContent = '↑ Lebihan ' + rm(over / 100) + ' → kredit ejen'; ov.classList.remove('hidden'); }
          else if (over < 0) { ov.className = 'text-xs text-red-400'; ov.textContent = '⚠ Agihan melebihi amaun sebanyak ' + rm(-over / 100); ov.classList.remove('hidden'); }
          else { ov.className = 'text-xs text-green-400'; ov.textContent = '✓ Agihan padan dengan amaun'; ov.classList.remove('hidden'); }
        }
        amaunEl.oninput = autoAgih;
        allocEls().forEach(inp => inp.oninput = recompute);
        document.getElementById('payAuto').onclick = autoAgih;
        document.getElementById('payClose').onclick = () => wrap.remove();
        wrap.onclick = ev => { if (ev.target === wrap) wrap.remove(); };

        document.getElementById('paySave').onclick = () => savePayment(st, wrap, false);
      }

      async function savePayment(st, wrap, force) {
        const errEl = document.getElementById('payErr');
        const btn = document.getElementById('paySave');
        errEl.classList.add('hidden');
        const amaun = parseFloat(document.getElementById('payAmaun').value) || 0;
        const kaedah = document.getElementById('payKaedah').value;
        const tarikh = document.getElementById('payTarikh').value;
        const rujukan = document.getElementById('payRujukan').value.trim();
        const catatan = document.getElementById('payCatatan').value.trim();
        if (amaun <= 0) { errEl.textContent = 'Amaun mesti > 0.'; errEl.classList.remove('hidden'); return; }
        const agihan = [];
        let allocSum = 0, overBaki = '';
        wrap.querySelectorAll('.pay-alloc').forEach(inp => {
          const v = parseFloat(inp.value) || 0;
          if (v > 0) {
            const baki = parseFloat(inp.dataset.baki) || 0;
            if (Math.round(v * 100) > Math.round(baki * 100)) { overBaki = inp.dataset.doc; return; }
            agihan.push({ doc_no: inp.dataset.doc, amaun: v }); allocSum += v;
          }
        });
        if (overBaki) { errEl.textContent = 'Agihan ke ' + overBaki + ' melebihi baki DO.'; errEl.classList.remove('hidden'); return; }
        if (allocSum - amaun > 0.001) { errEl.textContent = 'Jumlah agihan melebihi amaun.'; errEl.classList.remove('hidden'); return; }
        if (!payClientRef) payClientRef = (crypto.randomUUID ? crypto.randomUUID() : 'p' + Date.now() + Math.random().toString(36).slice(2));
        btn.disabled = true; btn.textContent = 'MENYIMPAN...';
        try {
          const res = await api('addPayment', { ejen_id: st.ejen.ejen_id, amaun, kaedah, tarikh, rujukan_resit: rujukan, catatan, agihan, force, client_ref: payClientRef });
          if (res.status === 'CONFIRM_DEPOSIT') {
            btn.disabled = false; btn.textContent = 'Simpan Bayaran';
            if (confirm(res.message)) { savePayment(st, wrap, true); }
            return;
          }
          if (res.status !== 'SUCCESS') { errEl.textContent = res.message; errEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Simpan Bayaran'; return; }
          wrap.remove();
          let msg = '✓ Bayaran disimpan';
          if (Number(res.lebih_kredit_rm) > 0) msg += ' · lebihan ' + rm(res.lebih_kredit_rm) + ' → kredit';
          toast(msg);
          openStatement(st.ejen.ejen_id);
        } catch (e) {
          errEl.textContent = 'Gagal sambung pelayan.'; errEl.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Simpan Bayaran';
        }
      }

      loadList();
    }
