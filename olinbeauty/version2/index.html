                    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none disabled:opacity-40" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Postage (RM)</label>
                  <input id="doPostage" type="number" step="0.01" min="0" placeholder="0.00"
                    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
              </div>
              <div class="grid sm:grid-cols-3 gap-3 mt-3">
                <div><label class="block text-xs text-gray-400 mb-1">Kurier <span class="text-gray-600">(opt)</span></label>
                  <input id="doKurier" type="text" placeholder="CITYLINK / J&T"
                    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">No. tracking <span class="text-gray-600">(opt)</span></label>
                  <input id="doTracking" type="text" placeholder="boleh isi petang"
                    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Berat (kg) <span class="text-gray-600">(opt)</span></label>
                  <input id="doBerat" type="number" step="0.01" min="0" placeholder="0"
                    class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
              </div>
              <div class="mt-3"><label class="block text-xs text-gray-400 mb-1">Catatan <span class="text-gray-600">(opt)</span></label>
                <input id="doCatatan" type="text" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
            </div>

            <div id="doErr" class="hidden mb-3 p-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm"></div>
            <button id="doSemak" class="w-full py-3 bg-brand-600 hover:bg-brand-500 text-gray-900 font-black uppercase tracking-wide rounded-xl transition">Semak DO →</button>
          </div>`;

        const ejenSel = document.getElementById('doEjen');
        ejenSel.onchange = () => {
          const e = ejenList.find(x => x.ejen_id === ejenSel.value);
          const info = document.getElementById('doEjenInfo');
          const tierSel = document.getElementById('doTierHarga');
          if (!e) { info.innerHTML = ''; if (tierSel) tierSel.innerHTML = '<option value="">— Pilih ejen dahulu —</option>'; return; }
          if (tierSel) {
            const isGold = String(e.tier || 'GOLD').toUpperCase() !== 'SILVER';
            tierSel.innerHTML = isGold
              ? '<option value="EJEN1">Harga Gold</option><option value="PROMO_GOLD">Harga Promo Gold</option>'
              : '<option value="EJEN2">Harga Silver</option><option value="PROMO_SILVER">Harga Promo Silver</option>';
          }
          const hutang = hutangMap[e.ejen_id] || 0;
          const base = `${e.kawasan || 'Kawasan -'}${e.target_bulanan_rm ? ' · Target ' + rm(e.target_bulanan_rm) + '/bln' : ''}`;
          info.innerHTML = hutang > 0
            ? `<span class="text-red-400 font-semibold">⚠ Hutang ${rm(hutang)}</span> · ${esc(base)}`
            : esc(base);
        };
        const diskJenis = document.getElementById('doDiskJenis');
        diskJenis.onchange = () => {
          const inp = document.getElementById('doDiskInput');
          inp.disabled = diskJenis.value === '-';
          if (inp.disabled) inp.value = '';
        };
        document.getElementById('doAddLine').onclick = () => addLine();
        document.getElementById('doTierHarga').addEventListener('change', () => {
          document.querySelectorAll('#doLines .do-row').forEach(row => {
            const sel = row.querySelector('.ln-sku');
            const opt = sel.options[sel.selectedIndex];
            const harga = getLineHarga(opt);
            const q = parseInt(row.querySelector('.ln-qty').value) || 0;
            const gift = row.querySelector('.ln-gift').checked;
            row.querySelector('.ln-jumlah').textContent = rm(q * (gift ? 0 : harga));
            const hint = row.querySelector('.ln-hint');
            if (sel.value && harga <= 0 && !gift) { hint.textContent = 'Produk tiada harga ejen — tanda Hadiah atau lengkapkan di Master.'; hint.classList.remove('hidden'); }
            else hint.classList.add('hidden');
          });
          updateSubtotal();
        });
        document.getElementById('doSemak').onclick = doPreview;
        if (prefill) {
          document.getElementById('doEjen').value = prefill.ejen_id || '';
          ejenSel.onchange();
          if (prefill.tier_harga) { const ts = document.getElementById('doTierHarga'); if (ts) ts.value = prefill.tier_harga; }
          if (prefill.tarikh) document.getElementById('doTarikh').value = prefill.tarikh;
          document.getElementById('doRujukan').value = prefill.rujukan_order_web || '';
          document.getElementById('doDiskJenis').value = prefill.diskaun_jenis || '-';
          diskJenis.onchange();
          if (prefill.diskaun_jenis && prefill.diskaun_jenis !== '-') document.getElementById('doDiskInput').value = prefill.diskaun_input || '';
          document.getElementById('doPostage').value = prefill.postage || '';
          document.getElementById('doKurier').value = prefill.kurier || '';
          document.getElementById('doTracking').value = prefill.no_tracking || '';
          document.getElementById('doBerat').value = prefill.berat_kg || '';
          document.getElementById('doCatatan').value = prefill.catatan || '';
          const pls = prefill.lines || [];
          if (pls.length) pls.forEach(ln => addLine(ln)); else addLine();
        } else {
          addLine();
        }
      }

      function getLineHarga(opt) {
        const tier = (document.getElementById('doTierHarga') || {}).value || 'EJEN1';
        if (!opt) return 0;
        return Number(tier === 'EJEN2' ? opt.dataset.e2 : tier === 'PROMO_GOLD' ? opt.dataset.c1 : tier === 'PROMO_SILVER' ? opt.dataset.c2 : opt.dataset.e1) || 0;
      }

      function addLine(pre) {
        lineSeq++;
        const wrap = document.getElementById('doLines');
        const div = document.createElement('tr');
        div.className = 'do-row border-b border-gray-700/40 hover:bg-gray-700/10 transition';
        const inp = 'w-full px-2 py-1.5 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none';
        div.innerHTML = `
          <td class="px-4 py-2 align-top">
            <select class="ln-sku ${inp}">${optHtml}</select>
            <div class="ln-hint hidden text-[11px] text-red-400 mt-1"></div>
          </td>
          <td class="px-3 py-2 align-top"><input type="number" class="ln-qty ${inp}" min="1" step="1" placeholder="0" /></td>
          <td class="px-3 py-2 align-top text-right"><span class="ln-baki inline-block px-2 py-1.5 text-sm text-gray-400 bg-gray-900 border border-gray-700/50 rounded-lg">—</span></td>
          <td class="px-3 py-2 align-top text-center"><input type="checkbox" class="ln-gift accent-brand-500 w-4 h-4" /></td>
          <td class="px-3 py-2 align-top text-right"><b class="ln-jumlah text-gray-300">RM 0.00</b></td>
          <td class="px-2 py-2 text-center align-top"><button type="button" class="btn-rm text-gray-500 hover:text-red-400 text-base leading-none">✕</button></td>`;
        wrap.appendChild(div);

        const sku = div.querySelector('.ln-sku'), qty = div.querySelector('.ln-qty'),
              baki = div.querySelector('.ln-baki'), gift = div.querySelector('.ln-gift'),
              jumlah = div.querySelector('.ln-jumlah'), hint = div.querySelector('.ln-hint');

        function refresh() {
          const opt = sku.options[sku.selectedIndex];
          const harga = getLineHarga(opt);
          const q = parseInt(qty.value) || 0;
          const wh = sku.value ? (whQty[sku.value] || 0) : null;
          baki.textContent = sku.value ? wh : '—';
          baki.className = 'ln-baki inline-block px-2 py-1.5 text-sm border rounded-lg ' +
            (sku.value && q > wh ? 'text-red-400 border-red-700 bg-red-900/20' : 'text-gray-400 bg-gray-900 border-gray-700/50');
          const eff = gift.checked ? 0 : harga;
          jumlah.textContent = rm(q * eff);
          // hint
          let msg = '';
          if (sku.value && harga <= 0 && !gift.checked) msg = 'Produk tiada harga ejen — tanda Hadiah atau lengkapkan di Master.';
          else if (sku.value && wh !== null && q > wh) msg = `Stok WH ${wh} sahaja — tak boleh simpan.`;
          hint.textContent = msg; hint.classList.toggle('hidden', !msg);
          updateSubtotal();
        }
        sku.onchange = refresh; qty.oninput = refresh; gift.onchange = refresh;
        div.querySelector('.btn-rm').onclick = () => { div.remove(); updateSubtotal(); };
        if (pre) { sku.value = pre.sku || ''; qty.value = pre.qty || ''; gift.checked = !!pre.gift; refresh(); }
      }

      function updateSubtotal() {
        let total = 0;
        document.querySelectorAll('#doLines .do-row').forEach(row => {
          const sel = row.querySelector('.ln-sku');
          const opt = sel.options[sel.selectedIndex];
          const harga = getLineHarga(opt);
          const q = parseInt(row.querySelector('.ln-qty').value) || 0;
          const gift = row.querySelector('.ln-gift').checked;
          total += q * (gift ? 0 : harga);
        });
        const elx = document.getElementById('doSubtotal');
        if (elx) elx.textContent = rm(total);
      }

      // ---------- GATHER + VALIDATE ----------
      function gatherPayload() {
        const errEl = document.getElementById('doErr');
        errEl.classList.add('hidden');
        const ejen_id = document.getElementById('doEjen').value;
        const tarikh = document.getElementById('doTarikh').value;
        const rujukan_order_web = document.getElementById('doRujukan').value.trim();
        if (!ejen_id) return fail('Sila pilih ejen.');
        if (!tarikh) return fail('Tarikh diperlukan.');
        const rows = document.querySelectorAll('#doLines .do-row');
        if (!rows.length) return fail('Tambah sekurang-kurangnya 1 produk.');
        const lines = [], seen = {};
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          const sel = row.querySelector('.ln-sku');
          const sku = sel.value;
          const opt = sel.options[sel.selectedIndex];
          const harga = getLineHarga(opt);
          const qty = parseInt(row.querySelector('.ln-qty').value) || 0;
          const gift = row.querySelector('.ln-gift').checked;
          if (!sku) return fail('Baris ' + (i + 1) + ': pilih produk.');
          if (seen[sku]) return fail(sku + ' berulang — gabungkan ke satu baris.');
          seen[sku] = true;
          if (qty <= 0) return fail('Baris ' + (i + 1) + ' (' + sku + '): kuantiti mesti > 0.');
          if (harga <= 0 && !gift) return fail(sku + ': tiada harga ejen — tanda Hadiah atau lengkapkan di Master.');
          const wh = whQty[sku] || 0;
          if (qty > wh) return fail(sku + ': stok WH ' + wh + ' sahaja (minta ' + qty + ').');
          lines.push({ sku, qty, gift });
        }
        const dj = document.getElementById('doDiskJenis').value;
        const payload = {
          ejen_id, tarikh, rujukan_order_web,
          tier_harga: document.getElementById('doTierHarga').value,
          lines,
          diskaun_jenis: dj,
          diskaun_input: dj === '-' ? 0 : (parseFloat(document.getElementById('doDiskInput').value) || 0),
          postage: parseFloat(document.getElementById('doPostage').value) || 0,
          kurier: document.getElementById('doKurier').value.trim(),
          no_tracking: document.getElementById('doTracking').value.trim(),
          berat_kg: parseFloat(document.getElementById('doBerat').value) || 0,
          catatan: document.getElementById('doCatatan').value.trim()
        };
        return payload;
        function fail(m) { errEl.textContent = m; errEl.classList.remove('hidden'); errEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); return null; }
      }

      // ---------- PREVIEW ----------
      async function doPreview() {
        const payload = gatherPayload();
        if (!payload) return;
        const btn = document.getElementById('doSemak');
        btn.disabled = true; btn.textContent = 'MENYEMAK...';
        try {
          const pv = await api('previewDO', payload);
          if (pv.status !== 'SUCCESS') {
            const errEl = document.getElementById('doErr'); errEl.textContent = pv.message; errEl.classList.remove('hidden');
            errEl.scrollIntoView({ behavior: 'smooth', block: 'center' }); return;
          }
          renderPreview(payload, pv);
        } catch (e) {
          const errEl = document.getElementById('doErr'); errEl.textContent = 'Gagal sambung pelayan.'; errEl.classList.remove('hidden');
        } finally { btn.disabled = false; btn.textContent = 'Semak DO →'; }
      }

      function renderPreview(payload, pv) {
        const ejen = ejenList.find(e => e.ejen_id === payload.ejen_id) || {};
        const linesHtml = pv.lines.map(l => `
          <div class="bg-gray-900 border border-gray-700 rounded-lg p-3">
            <div class="flex justify-between items-start gap-2">
              <div><span class="font-mono text-xs text-brand-400">${esc(l.sku)}</span>
                <span class="text-sm ml-1">${esc(l.nama)}</span>
                ${l.gift ? '<span class="ml-1 text-[10px] px-1.5 py-0.5 rounded bg-pink-900/50 text-pink-300">HADIAH</span>' : ''}</div>
              <div class="text-right text-sm whitespace-nowrap">${l.qty} × ${rm(l.harga_seunit_rm)}<br><b>${rm(l.jumlah_rm)}</b></div>
            </div>
            <div class="mt-2 pt-2 border-t border-gray-700 text-xs text-gray-400">
              <div class="text-[10px] uppercase tracking-wide text-gray-600 mb-1">Picking list (FEFO)</div>
              ${l.allocation.map(a => `<div class="flex justify-between"><span>${esc(a.batch_no)}${a.rak ? ' · rak ' + esc(a.rak) : ''}${a.expiry ? ' · exp ' + esc(a.expiry) : ''}</span><span class="text-gray-300">×${a.ambil}</span></div>`).join('')}
            </div>
          </div>`).join('');

        const warnHtml = (pv.warnings && pv.warnings.length) ? `
          <div class="bg-amber-500/10 border border-amber-500/40 rounded-lg p-3 mb-3 text-sm">
            <div class="font-bold text-amber-400 mb-1">⚠ Batch hampir luput</div>
            ${pv.warnings.map(w => `<div class="text-xs text-amber-200">${esc(w.sku)} · batch ${esc(w.batch_no)} · exp ${esc(w.expiry)} (×${w.ambil})</div>`).join('')}
          </div>` : '';

        el.innerHTML = `
          <div class="w-full">
            <button id="doBack" class="text-sm text-gray-400 hover:text-gray-200 mb-3">← Edit DO</button>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 mb-4">
              <div class="text-sm text-gray-400">Pengesahan DO untuk</div>
              <div class="text-xl font-bold text-brand-400">${esc(ejen.nama || payload.ejen_id)}</div>
              <div class="text-xs text-gray-500">${esc(payload.ejen_id)} · ${esc(payload.tarikh)}${payload.rujukan_order_web ? ' · ' + esc(payload.rujukan_order_web) : ''}</div>
            </div>
            ${warnHtml}
            <div class="space-y-3 mb-4">${linesHtml}</div>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 mb-4 text-sm">
              <div class="flex justify-between py-1"><span class="text-gray-400">Subtotal</span><span>${rm(pv.subtotal_rm)}</span></div>
              ${pv.diskaun_rm > 0 ? `<div class="flex justify-between py-1 text-red-300"><span>− Diskaun${pv.diskaun_jenis === 'PERATUS' ? ' (' + pv.diskaun_input + '%)' : ''}</span><span>− ${rm(pv.diskaun_rm)}</span></div>` : ''}
              ${pv.postage_rm > 0 ? `<div class="flex justify-between py-1 text-gray-300"><span>+ Postage</span><span>+ ${rm(pv.postage_rm)}</span></div>` : ''}
              <div class="flex justify-between py-2 mt-1 border-t border-gray-700 text-lg font-black"><span>JUMLAH</span><span class="text-brand-400">${rm(pv.jumlah_bersih_rm)}</span></div>
            </div>
            <div id="doErr2" class="hidden mb-3 p-3 bg-red-900/40 border border-red-700 rounded-lg text-red-300 text-sm"></div>
            <button id="doConfirm" class="w-full py-3 bg-brand-600 hover:bg-brand-500 text-gray-900 font-black uppercase tracking-wide rounded-xl transition">✓ Sahkan & Simpan DO</button>
          </div>`;

        document.getElementById('doBack').onclick = () => renderForm(payload);
        document.getElementById('doConfirm').onclick = () => doSubmit(payload, false);
      }

      // ---------- SUBMIT ----------
      let clientRef = null;
      async function doSubmit(payload, sahkanExpiry) {
        const btn = document.getElementById('doConfirm');
        const errEl = document.getElementById('doErr2');
        errEl.classList.add('hidden');
        btn.disabled = true; btn.textContent = 'MENYIMPAN...';
        if (!clientRef) clientRef = (crypto.randomUUID ? crypto.randomUUID() : 'r' + Date.now() + Math.random().toString(36).slice(2));
        try {
          const res = await api('addDOEjen', Object.assign({}, payload, { sahkanAmaranExpiry: sahkanExpiry, client_ref: clientRef }));
          if (res.status === 'CONFIRM_EXPIRY') {
            btn.disabled = false;
            btn.textContent = '⚠ Sahkan batch hampir luput & teruskan';
            btn.classList.remove('bg-brand-600', 'hover:bg-brand-500');
            btn.classList.add('bg-amber-500', 'hover:bg-amber-400');
            errEl.innerHTML = esc(res.message || 'Ada batch hampir luput.') + '<br>' +
              (res.warnings || []).map(w => `• ${esc(w.sku)} batch ${esc(w.batch_no)} exp ${esc(w.expiry)}`).join('<br>');
            errEl.className = 'mb-3 p-3 bg-amber-500/10 border border-amber-500/40 rounded-lg text-amber-200 text-sm';
            errEl.classList.remove('hidden');
            btn.onclick = () => doSubmit(payload, true); // sahkan
            return;
          }
          if (res.status !== 'SUCCESS') {
            errEl.textContent = res.message; errEl.classList.remove('hidden');
            btn.disabled = false; btn.textContent = '✓ Sahkan & Simpan DO'; return;
          }
          _stokCache = null; // baki berubah
          if (res.duplicate) return renderDuplicate(res);
          renderSuccess(res);
        } catch (e) {
          errEl.textContent = 'Gagal sambung pelayan. Cuba lagi.'; errEl.classList.remove('hidden');
          btn.disabled = false; btn.textContent = '✓ Sahkan & Simpan DO';
        }
      }

      // ---------- DUPLICATE (idempoten) ----------
      function renderDuplicate(res) {
        el.innerHTML = `
          <div class="max-w-lg mx-auto text-center py-16">
            <div class="w-12 h-12 mx-auto mb-3 rounded-2xl bg-gray-900 border border-gray-700 flex items-center justify-center text-gray-400">${ico('file', 'w-6 h-6')}</div>
            <h2 class="text-xl font-bold text-gray-200">DO sudah disimpan</h2>
            <p class="text-gray-400 mt-2 text-sm"><b class="text-brand-400">${esc(res.doc_no)}</b> · ${rm(res.jumlah_bersih_rm)} telah direkod sebelum ini (sistem elak pendua).</p>
            <div class="mt-5 flex gap-2 justify-center">
              <a href="#/stok" class="px-4 py-2 bg-gray-700 hover:bg-gray-600/30 rounded-lg text-sm">Lihat Stok</a>
              <button id="dupNew" class="px-4 py-2 bg-brand-600 text-gray-900 font-bold rounded-lg text-sm">+ DO Baru</button>
            </div>
          </div>`;
        document.getElementById('dupNew').onclick = () => { clientRef = null; lineSeq = 0; whQty = {}; viewDOEjen(el); };
      }

      // ---------- SUCCESS ----------
      function renderSuccess(res) {
        const pickHtml = (res.allocation || []).map(l => `
          <div class="border-b border-gray-700 py-2">
            <div class="flex justify-between"><span class="text-sm font-semibold">${esc(l.nama)} ${l.gift ? '<span class="text-[10px] text-pink-300">(hadiah)</span>' : ''}</span><span class="text-sm text-gray-400">${l.qty} unit</span></div>
            ${(l.batches || []).map(b => `<div class="text-xs text-gray-400 ml-2">↳ ambil <b class="text-gray-200">${b.ambil}</b> dari ${esc(b.batch_no || '(tiada batch)')}${b.rak ? ' · rak <b class="text-brand-400">' + esc(b.rak) + '</b>' : ''}${b.expiry ? ' · exp ' + esc(b.expiry) : ''}</div>`).join('')}
          </div>`).join('');

        el.innerHTML = `
          <div class="w-full">
            <div class="bg-gradient-to-br from-green-900/40 to-gray-900 border border-green-700/50 rounded-xl p-6 text-center mb-4">
              <div class="w-10 h-10 mx-auto mb-2 rounded-full bg-green-900/60 flex items-center justify-center text-green-400">${ico('check', 'w-5 h-5')}</div>
              <div class="text-sm text-gray-400">DO berjaya disimpan</div>
              <div class="text-3xl font-black text-brand-400 tracking-tight my-1">${esc(res.doc_no)}</div>
              <div class="text-sm text-gray-300">${esc(res.ejen_nama)} · ${rm(res.jumlah_bersih_rm)}</div>
            </div>

            <div class="bg-gray-800 border border-gray-700 rounded-xl p-5 mb-4">
              <h3 class="font-bold text-gray-100 mb-2">Picking List</h3>
              <p class="text-xs text-gray-500 mb-2">Ambil ikut urutan FEFO (batch terawal luput dahulu).</p>
              ${pickHtml}
            </div>

            <div class="grid grid-cols-2 sm:grid-cols-4 gap-2 mb-3">
              <button id="doWa" class="py-2.5 bg-green-600 hover:bg-green-500 text-white font-bold text-sm rounded-lg">Salin WhatsApp</button>
              <button id="doPrint" class="py-2.5 bg-gray-700 hover:bg-gray-600/30 text-gray-100 font-bold text-sm rounded-lg">Cetak DO</button>
              <a href="#/stok" class="py-2.5 bg-gray-700 hover:bg-gray-600/30 text-gray-100 font-bold text-sm rounded-lg text-center">Lihat Stok</a>
              <button id="doNew" class="py-2.5 bg-brand-600 hover:bg-brand-500 text-gray-900 font-bold text-sm rounded-lg">+ DO Baru</button>
            </div>
          </div>`;

        document.getElementById('doWa').onclick = () => copyWhatsapp(res);
        document.getElementById('doPrint').onclick = () => printDO(res);
        document.getElementById('doNew').onclick = () => { clientRef = null; lineSeq = 0; whQty = {}; viewDOEjen(el); };
      }

      function copyWhatsapp(res) {
        let tpl = settings.whatsapp_template_do || 'Salam {nama}! DO {doc_no} jumlah RM{jumlah}. Terima kasih 💛';
        const txt = tpl
          .replace(/{nama}/g, res.ejen_nama || '')
          .replace(/{do_no}/g, res.doc_no || '').replace(/{doc_no}/g, res.doc_no || '')
          .replace(/{jumlah}/g, Number(res.jumlah_bersih_rm).toFixed(2)).replace(/{jumlah_bersih}/g, Number(res.jumlah_bersih_rm).toFixed(2));
        const done = () => toast('Teks WhatsApp disalin!');
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(txt).then(done).catch(() => fallbackCopy(txt, done));
        else fallbackCopy(txt, done);
      }
      function fallbackCopy(txt, done) {
        const ta = document.createElement('textarea'); ta.value = txt; document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); done(); } catch (e) { toast('Tak dapat salin.', 'error'); }

      function updateTotal() {
        let total = 0, units = 0, items = 0;
        document.querySelectorAll('#grnLines .grn-row').forEach(row => {
          const q = parseInt(row.querySelector('.line-qty').value) || 0;
          const k = parseFloat(row.querySelector('.line-kos').value) || 0;
          if (row.querySelector('.line-sku').value) items++;
          units += q;
          total += q * k;
          row.querySelector('.line-jumlah').textContent = rm(q * k);
        });
        document.getElementById('grnTotal').textContent = rm(total);
        document.getElementById('grnRingkas').textContent = `${items} produk · ${units} unit`;
      }

      function addLine() {
        lineCount++;
        const wrap = document.getElementById('grnLines');
        const tr = document.createElement('tr');
        tr.className = 'grn-row border-b border-gray-700/40 hover:bg-gray-700/10 transition';
        const inp = 'w-full px-2 py-1.5 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none';
        tr.innerHTML = `
          <td class="px-4 py-2 align-top"><select class="line-sku ${inp}">${optHtml}</select></td>
          <td class="px-3 py-2 align-top"><input type="number" class="line-qty ${inp}" min="1" step="1" placeholder="0" /></td>

          <td class="px-3 py-2 align-top"><input type="date" class="line-exp ${inp} opacity-30" disabled /><span class="line-exp-na hidden text-[10px] text-gray-600">tiada expiry</span></td>
          <td class="px-3 py-2 align-top"><input type="number" class="line-kos ${inp}" min="0" step="0.01" placeholder="0.00" /></td>
          <td class="px-3 py-2 text-right align-middle whitespace-nowrap"><b class="line-jumlah text-gray-200">RM 0.00</b></td>
          <td class="px-2 py-2 text-center align-middle"><button type="button" class="btn-rm text-gray-500 hover:text-red-400 text-base leading-none" title="Padam baris">✕</button></td>`;
        wrap.appendChild(tr);

        const skuSel = tr.querySelector('.line-sku'), qtyInput = tr.querySelector('.line-qty'),
              kosInput = tr.querySelector('.line-kos'), expInput = tr.querySelector('.line-exp'), expNa = tr.querySelector('.line-exp-na');

        skuSel.onchange = () => {
          const opt = skuSel.options[skuSel.selectedIndex];
          if (opt.dataset.kos) kosInput.value = opt.dataset.kos;
          const adaExp = opt.dataset.exp === 'YES';
          expInput.disabled = !adaExp;
          expInput.classList.toggle('opacity-30', !adaExp);
          expInput.classList.toggle('hidden', !adaExp);
          expNa.classList.toggle('hidden', adaExp);
          updateTotal();
        };
        qtyInput.addEventListener('input', updateTotal);
        kosInput.addEventListener('input', updateTotal);

      document.getElementById('btnAddLine').onclick = addLine;

      document.getElementById('btnGrnSubmit').onclick = async () => {
        const errEl = document.getElementById('grnErr');
        const saveBtn = document.getElementById('btnGrnSubmit');
        errEl.classList.add('hidden');

        const tarikh = document.getElementById('grnTarikh').value;
        const pembekal = document.getElementById('grnPembekal').value.trim();
        const catatan = document.getElementById('grnCatatan').value.trim();
        if (!tarikh) { errEl.textContent = 'Tarikh diperlukan.'; errEl.classList.remove('hidden'); return; }

        const rows = document.querySelectorAll('#grnLines .grn-row');
        if (!rows.length) { errEl.textContent = 'Tambah sekurang-kurangnya 1 produk.'; errEl.classList.remove('hidden'); return; }

        const linesData = [];
        let valid = true;
        rows.forEach((row, i) => {
          if (!valid) return;
          const sku = row.querySelector('.line-sku').value;
          const qty = parseInt(row.querySelector('.line-qty').value) || 0;
          const batch_no = row.querySelector('.line-batch').value.trim();
          const expiry = row.querySelector('.line-exp').value;
          const kos = parseFloat(row.querySelector('.line-kos').value) || 0;
          const adaExp = row.querySelector('.line-sku').options[row.querySelector('.line-sku').selectedIndex]?.dataset.exp === 'YES';
          if (!sku) { errEl.textContent = 'Baris ' + (i+1) + ': Pilih produk.'; errEl.classList.remove('hidden'); valid = false; return; }
          if (qty <= 0) { errEl.textContent = 'Baris ' + (i+1) + ': Kuantiti mesti > 0.'; errEl.classList.remove('hidden'); valid = false; return; }
          if (!batch_no) { errEl.textContent = 'Baris ' + (i+1) + ': No. batch diperlukan.'; errEl.classList.remove('hidden'); valid = false; return; }
          if (adaExp && !expiry) { errEl.textContent = 'Baris ' + (i+1) + ': Tarikh expiry diperlukan.'; errEl.classList.remove('hidden'); valid = false; return; }
          linesData.push({ sku, qty, batch_no, expiry, kos_seunit_rm: kos });
        });
        if (!valid) return;

        saveBtn.disabled = true; saveBtn.textContent = 'MENYIMPAN...';
        try {
          const clientRef = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
          const res = await api('addGRN', { tarikh, pembekal, catatan, lines: linesData, client_ref: clientRef });
          if (res.status !== 'SUCCESS') { errEl.textContent = res.message; errEl.classList.remove('hidden'); return; }
          _stokCache = null; // buang cache stok lama
          toast('✓ ' + res.doc_no + ' disimpan — ' + res.bilangan_baris + ' baris · ' + rm(res.jumlah_rm));
          location.hash = '#/stok';
        } catch (e) {
          errEl.textContent = 'Gagal sambung pelayan. Cuba lagi.'; errEl.classList.remove('hidden');
        } finally {
          saveBtn.disabled = false; saveBtn.textContent = 'SIMPAN GRN';
        }
      };

      addLine(); // start dengan 1 baris kosong
    }

            if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal void.', 'error'); btn.disabled = false; btn.textContent = 'Sahkan VOID'; return; }
            toast(docNo + ' di-VOID (' + r.bil_reversal + ' reversal).');

    // ===================== VIEWS M5: KIRAAN STOK (S12 — blind count) =====================
    function viewKiraan(el) {
      el.className = 'p-4 sm:p-6 fade';
      const isAdmin = state.staf.role === 'ADMIN';
      const outlets = (state.master.outlet || []);
      el.innerHTML = `
        <div class="w-full">
          <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4">
            <h3 class="text-xs font-bold uppercase text-gray-500 mb-2">Mula Sesi Kiraan Baru</h3>
            <p class="text-[11px] text-gray-500 mb-3">Kira fizikal TANPA tengok sistem (blind count). Lepas siap, Admin lulus → pelarasan auto.</p>
            <div class="flex gap-2">
              <select id="kLokasi" class="flex-1 px-2 py-2 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none">
                <option value="WAREHOUSE">WAREHOUSE</option><option value="ROSAK">ROSAK (kuarantin)</option>
                ${outlets.map(o => `<option value="${esc(o.outlet_id)}">${esc(o.outlet_id)} — ${esc(o.nama)}</option>`).join('')}
              </select>
              <button id="btnMula" class="px-4 py-2 bg-brand-600 hover:bg-brand-500 text-gray-900 font-bold rounded-lg text-sm">Mula Sesi</button>
            </div>
          </div>
          <h3 class="text-xs font-bold uppercase text-gray-500 mb-2">Sesi Kiraan</h3>
          <div id="scList">${spinner()}</div>
        </div>`;
      const loadList = async () => {
        const list = document.getElementById('scList');
        try {
          const res = await api('getStockCount', {});
          if (res.status !== 'SUCCESS') { list.innerHTML = emptyState('alert', 'Gagal', res.message || ''); return; }
          if (!res.sesi.length) { list.innerHTML = emptyState('clipboard', 'Belum ada sesi kiraan', 'Mula sesi pertama di atas.'); return; }
          const SC_PILL = { DRAF: 'bg-amber-500/15 text-amber-300', DILULUS: 'bg-green-500/15 text-green-300', DITOLAK: 'bg-red-500/15 text-red-300' };
          list.innerHTML = res.sesi.map(s => `
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-3 mb-2 flex items-center gap-3 cursor-pointer hover:border-brand-500/40 sc-row" data-no="${esc(s.sc_no)}">
              <div class="flex-1">
                <div class="font-mono font-bold text-sm">${esc(s.sc_no)} <span class="text-gray-500 font-normal">· ${esc(s.lokasi)}</span></div>
                <div class="text-[10px] text-gray-500">${esc(s.tarikh)} · ${s.bil_dikira}/${s.bil_baris} dikira · oleh ${esc(s.created_by)}${s.adj_doc_no ? ' · → ' + esc(s.adj_doc_no) : ''}</div>
              </div>
              <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${SC_PILL[s.status] || ''}">${esc(s.status)}</span>
            </div>`).join('');
          list.querySelectorAll('.sc-row').forEach(d => { d.onclick = () => showKiraanSesi(el, d.getAttribute('data-no')); });
        } catch (e) { if (e.message !== 'AUTH') list.innerHTML = emptyState('alert', 'Tak dapat sambung', ''); }
      };
      document.getElementById('btnMula').onclick = async () => {
        const lokasi = document.getElementById('kLokasi').value;
        if (!confirm('Mula sesi kiraan untuk ' + lokasi + '? Pastikan tiada transaksi ' + lokasi + ' semasa mengira.')) return;
        const btn = document.getElementById('btnMula');
        btn.disabled = true; btn.textContent = 'MEMULA…';
        try {
          const r = await api('createStockCount', { lokasi, client_ref: crypto.randomUUID() });
          if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal.', 'error'); btn.disabled = false; btn.textContent = 'Mula Sesi'; return; }
          toast('Sesi ' + r.sc_no + ' dimula — ' + r.bilangan_baris + ' baris.');
          showKiraanSesi(el, r.sc_no);
        } catch (e) { toast('Tak dapat sambung.', 'error'); btn.disabled = false; btn.textContent = 'Mula Sesi'; }
      };
      loadList();
    }

    async function showKiraanSesi(el, scNo) {
      el.innerHTML = spinner('Memuatkan ' + scNo + '…');
      let res;
      try { res = await api('getStockCount', { sc_no: scNo }); }
      catch (e) { if (e.message !== 'AUTH') el.innerHTML = emptyState('alert', 'Tak dapat sambung', ''); return; }
      if (res.status !== 'SUCCESS') { el.innerHTML = emptyState('alert', 'Gagal', res.message || ''); return; }
      const isAdmin = state.staf.role === 'ADMIN';
      const isDraf = String(res.sc_status || '').toUpperCase() === 'DRAF'; // sc_status (bukan 'status' — itu envelope)
      renderSesi();
      function renderSesi() {
        const rows = res.baris || [];
        el.innerHTML = `
          <div class="w-full">
            <button id="btnBackSc" class="mb-4 text-sm text-gray-400 hover:text-gray-200">← Senarai Sesi</button>
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4">
              <div class="flex items-center gap-3 flex-wrap">
                <span class="font-mono font-black text-brand-400">${esc(scNo)}</span>
                <span class="text-sm text-gray-300">${esc(res.lokasi)}</span>
                <span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${isDraf ? 'bg-amber-500/15 text-amber-300' : (res.sc_status === 'DILULUS' ? 'bg-green-500/15 text-green-300' : 'bg-red-500/15 text-red-300')}">${esc(res.sc_status || '')}</span>
                <span class="text-[10px] text-gray-500 ml-auto">${esc(res.tarikh)}</span>
              </div>
              ${isDraf ? `<p class="text-[11px] text-gray-500 mt-2">Isi kiraan FIZIKAL sahaja${isAdmin ? '' : ' — angka sistem disembunyikan (blind count)'}. Boleh simpan separuh & sambung.</p>` : ''}
              ${res.adj_doc_no ? `<p class="text-[11px] text-green-400 mt-2">Pelarasan dijana: <span class="font-mono">${esc(res.adj_doc_no)}</span></p>` : ''}
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-xl overflow-hidden mb-4">
              <table class="w-full text-sm">
                <thead><tr class="text-left text-[10px] uppercase text-gray-500 border-b border-gray-700">
                  <th class="px-3 py-2">Produk / Batch</th>
                  ${isAdmin ? '<th class="px-2 py-2 text-right">Sistem</th>' : ''}
                  <th class="px-2 py-2 text-right w-24">Fizikal</th>
                  ${isAdmin ? '<th class="px-2 py-2 text-right">Varians</th>' : ''}
                </tr></thead>
                <tbody>${rows.map((r, i) => {
                  const v = (isAdmin && r.varians !== null && r.varians !== undefined) ? r.varians : null;
                  return `<tr class="border-b border-gray-700/40 ${r.ditemui ? 'bg-sky-500/5' : ''}">
                    <td class="px-3 py-2">
                      <div class="font-semibold">${esc(r.sku)} <span class="text-gray-500 font-normal text-xs hidden sm:inline">— ${esc(r.nama)}</span>${r.ditemui ? ' <span class="text-[9px] text-sky-400 font-bold">DITEMUI</span>' : ''}</div>
                      <div class="text-[10px] text-gray-500 font-mono">${esc(r.batch_no || r.batch_id)}${r.expiry ? ' · exp ' + esc(r.expiry) : ''}${r.rak ? ' · rak ' + esc(r.rak) : ''}</div>
                    </td>
                    ${isAdmin ? `<td class="px-2 py-2 text-right text-gray-400">${r.qty_sistem !== undefined ? r.qty_sistem : ''}</td>` : ''}
                    <td class="px-2 py-2 text-right">${isDraf
                      ? `<input type="number" min="0" step="1" value="${r.qty_fizikal === null ? '' : r.qty_fizikal}" data-i="${i}" class="kq w-20 px-2 py-1 bg-gray-900 border border-gray-700 rounded text-right text-sm focus:border-brand-500 focus:outline-none" />`
                      : (r.qty_fizikal === null ? '<span class="text-gray-600">—</span>' : r.qty_fizikal)}</td>
                    ${isAdmin ? `<td class="px-2 py-2 text-right font-bold ${v === null ? 'text-gray-600' : v === 0 ? 'text-green-400' : 'text-red-400'}">${v === null ? '—' : (v > 0 ? '+' : '') + v}</td>` : ''}
                  </tr>`;
                }).join('')}</tbody>
              </table>
            </div>
            ${isDraf ? `
              <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4">
                <h3 class="text-xs font-bold uppercase text-gray-500 mb-2">＋ Batch Ditemui (kotak lama tiada dalam senarai)</h3>
                <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                  <select id="fdSku" class="px-2 py-2 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:border-brand-500 focus:outline-none"><option value="">Produk…</option>${prodOptGroups(state.master.produk)}</select>
                  <input id="fdBatch" type="text" placeholder="No batch" class="px-2 py-2 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:border-brand-500 focus:outline-none" />
                  <input id="fdExp" type="date" title="Expiry (jika ada)" class="px-2 py-2 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:border-brand-500 focus:outline-none" />
                  <input id="fdQty" type="number" min="1" step="1" placeholder="Qty" class="px-2 py-2 bg-gray-900 border border-gray-700 rounded-lg text-xs focus:border-brand-500 focus:outline-none" />
                </div>
                <button id="fdTambah" class="mt-2 px-3 py-1.5 bg-gray-700 hover:bg-gray-600/30 rounded-lg text-xs">＋ Tambah ke kiraan</button>
              </div>
              <button id="btnSimpanSc" class="w-full py-3 bg-brand-600 hover:bg-brand-500 text-gray-900 font-black uppercase rounded-xl">Simpan Kiraan</button>
              ${isAdmin ? `<div class="flex gap-2 mt-3">
                <button id="btnTolakSc" class="flex-1 py-2.5 bg-red-600/20 border border-red-500/40 text-red-300 font-bold rounded-lg text-sm">✕ Tolak Sesi</button>
                <button id="btnLulusSc" class="flex-1 py-2.5 bg-green-600/20 border border-green-500/40 text-green-300 font-bold rounded-lg text-sm">✓ Lulus & Jana Pelarasan</button>
              </div>` : '<p class="text-[10px] text-gray-600 text-center mt-3">Selepas simpan, maklumkan Admin untuk lulus.</p>'}
            ` : ''}
          </div>`;
        document.getElementById('btnBackSc').onclick = () => viewKiraan(el);
        if (!isDraf) return;
        const collectBaris = () => {
          const out = [];
          el.querySelectorAll('.kq').forEach(inp => {
            const r = rows[Number(inp.getAttribute('data-i'))];
            if (inp.value === '') return;
            out.push(r.ditemui
              ? { sku: r.sku, batch_no_ditemui: r.batch_no, expiry_ditemui: r.expiry, qty_fizikal: inp.value }
              : { sku: r.sku, batch_id: r.batch_id, qty_fizikal: inp.value });
          });
          return out;
        };
        const saveSc = async () => {
          const baris = collectBaris();
          if (!baris.length) { toast('Tiada kiraan diisi lagi.', 'warn'); return false; }
          const r = await api('saveStockCount', { sc_no: scNo, baris });
          if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal simpan.', 'error'); return false; }
          return true;
        };
        document.getElementById('btnSimpanSc').onclick = async () => {
          const btn = document.getElementById('btnSimpanSc');
          btn.disabled = true; btn.textContent = 'MENYIMPAN…';
          try { if (await saveSc()) { toast('Kiraan disimpan.'); showKiraanSesi(el, scNo); return; } }
          catch (e) { toast('Tak dapat sambung.', 'error'); }
          btn.disabled = false; btn.textContent = 'Simpan Kiraan';
        };
        document.getElementById('fdTambah').onclick = async () => {
          const sku = document.getElementById('fdSku').value;
          const bno = document.getElementById('fdBatch').value.trim();
          const exp = document.getElementById('fdExp').value;
          const qty = Number(document.getElementById('fdQty').value);
          if (!sku || !bno || !(qty > 0) || qty !== Math.floor(qty)) return toast('Isi produk, no batch & qty (integer).', 'warn');
          try {
            const r = await api('saveStockCount', { sc_no: scNo, baris: [{ sku, batch_no_ditemui: bno, expiry_ditemui: exp, qty_fizikal: qty }] });
            if (r.status !== 'SUCCESS') return toast(r.message || 'Gagal.', 'error');
            toast('Batch ditemui ditambah.');
            showKiraanSesi(el, scNo);
          } catch (e) { toast('Tak dapat sambung.', 'error'); }
        };
        const btnLulus = document.getElementById('btnLulusSc');
        if (btnLulus) btnLulus.onclick = async () => {
          if (!confirm('Lulus sesi ' + scNo + '? Varians akan jana Pelarasan (ADJ) — direkod selamanya sebagai shrinkage.')) return;
          btnLulus.disabled = true; btnLulus.textContent = 'MEMPROSES…';
          try {
            // simpan dulu input belum-simpan (jika ada)
            const baris = collectBaris();
            if (baris.length) { const sv = await api('saveStockCount', { sc_no: scNo, baris }); if (sv.status !== 'SUCCESS') { toast(sv.message || 'Gagal simpan.', 'error'); btnLulus.disabled = false; btnLulus.textContent = '✓ Lulus & Jana Pelarasan'; return; } }
            const r = await api('approveStockCount', { sc_no: scNo });
            if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal lulus.', 'error'); btnLulus.disabled = false; btnLulus.textContent = '✓ Lulus & Jana Pelarasan'; return; }
            toast(r.mesej || 'Diluluskan.');
            showKiraanSesi(el, scNo);
          } catch (e) { toast('Tak dapat sambung.', 'error'); btnLulus.disabled = false; btnLulus.textContent = '✓ Lulus & Jana Pelarasan'; }
        };
        const btnTolak = document.getElementById('btnTolakSc');
        if (btnTolak) btnTolak.onclick = async () => {
          const cat = prompt('Sebab tolak sesi ' + scNo + '?');
          if (cat === null) return; // batal
          if (!confirm('Tolak sesi ' + scNo + '? Kiraan tidak akan diguna.')) return;
          try {
            const r = await api('rejectStockCount', { sc_no: scNo, catatan: cat });
            if (r.status !== 'SUCCESS') return toast(r.message || 'Gagal.', 'error');
            toast('Sesi ditolak.');
            viewKiraan(el);
          } catch (e) { toast('Tak dapat sambung.', 'error'); }
        };
      }
    }

    async function viewStok(el) {
      el.className = 'p-4 sm:p-6 fade';
      el.innerHTML = `
        <div class="w-full">
          <div class="flex flex-wrap items-center gap-3 mb-4">
            <input id="stokQ" type="search" placeholder="Cari SKU / nama…"
              class="flex-1 min-w-48 px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" />
            <select id="stokLok" class="px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none">
              <option value="">Semua lokasi</option>
              <option value="WAREHOUSE">Warehouse</option>
            </select>
            <label class="flex items-center gap-2 text-xs text-gray-400 cursor-pointer select-none px-2">
              <input id="stokShowEmpty" type="checkbox" class="accent-brand-500"> Tunjuk batch habis
            </label>
            <button id="btnStokRefresh" class="px-3 py-2 bg-gray-700 hover:bg-gray-600/30 rounded-lg text-sm">↻ Muat semula</button>
          </div>
          <div id="stokBody"><div class="py-12 text-center text-gray-500 text-sm"><span class="spin inline-block mr-2">⏳</span>Memuatkan stok…</div></div>
        </div>`;

      async function loadStok(force) {
        if (!force && _stokCache) return renderStokTable(_stokCache);
        try {
          const r = await api('getStock', { include_empty: true }, force ? { fresh: true } : undefined);
          if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal muat stok.', 'error'); return; }
          _stokCache = r.stok;
          renderStokTable(_stokCache);
        } catch (e) { toast('Gagal sambung pelayan.', 'error'); }
      }

      function renderStokTable(data) {
        const q = (document.getElementById('stokQ') || {}).value || '';
        const lok = (document.getElementById('stokLok') || {}).value || '';
        const showEmpty = !!(document.getElementById('stokShowEmpty') || {}).checked;
        const isAdmin = !!(state.staf && state.staf.role === 'ADMIN');
        const NON_OUTLET = { WAREHOUSE: 1, SEKAT: 1, ROSAK: 1 };
        const _outMap = {};
        ((state.master && state.master.outlet) || []).forEach(o => { _outMap[String(o.outlet_id).toUpperCase()] = o.nama; });
        const ql = q.toLowerCase();
        const filtered = data.filter(p =>
          (!ql || p.sku.toLowerCase().includes(ql) || p.nama.toLowerCase().includes(ql)) &&
          (!lok || p.batches.some(b => b.lokasi === lok))
        );

        const _cfg = (state.master && state.master.settingsPublic) || {};
        const _kritHari = Number(_cfg.tempoh_expiry_kritikal_hari || 30);
        const _alertHari = Number(_cfg.tempoh_alert_expiry_hari || 90);
        const today = new Date().toISOString().slice(0, 10);
        // alert30 = tetingkap kritikal, alert90 = tetingkap amaran (ikut Tetapan, konsisten dgn Dashboard)
        const alert30 = new Date(Date.now() + _kritHari * 86400000).toISOString().slice(0, 10);
        const alert90 = new Date(Date.now() + _alertHari * 86400000).toISOString().slice(0, 10);

        const todayMs = new Date(today + 'T00:00:00').getTime();
        function daysLeft(exp) {
          if (!exp) return null;
          return Math.round((new Date(exp + 'T00:00:00').getTime() - todayMs) / 86400000);
        }
        function expiryPill(exp) {
          const d = daysLeft(exp);
          if (d === null) return '';
          if (d < 0) return `<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-700 text-gray-400">⚫ Luput ${Math.abs(d)}h lalu</span>`;
          if (exp <= alert30) return `<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-red-500/15 text-red-300">${d} hari lagi</span>`;
          if (exp <= alert90) return `<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-amber-500/15 text-amber-300">${d} hari lagi</span>`;
          return `<span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-700/50 text-gray-500">${d} hari</span>`;
        }

        const rows = filtered.map(p => {
          // aggregate per lokasi
          const byLok = {};
          p.batches.forEach(b => { byLok[b.lokasi] = (byLok[b.lokasi] || 0) + b.qty; });
          const wh = byLok['WAREHOUSE'] || 0;
          const sekat = byLok['SEKAT'] || 0;
          const outletTotal = Object.keys(byLok).filter(k => !NON_OUTLET[k]).reduce((s, k) => s + byLok[k], 0);
          // expiry alert
          let expiryBadge = '';
          if (p.ada_expiry === 'YES') {
            const expiringBatches = p.batches.filter(b => b.expiry && b.qty > 0);
            if (expiringBatches.length) {
              const earliest = expiringBatches.reduce((a, b) => a.expiry < b.expiry ? a : b);
              if (earliest.expiry <= today) expiryBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] bg-red-900/60 text-red-300">LUPUT</span>';
              else if (earliest.expiry <= alert30) expiryBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] bg-red-800/60 text-red-300">KRITIKAL ' + earliest.expiry + '</span>';
              else if (earliest.expiry <= alert90) expiryBadge = '<span class="px-1.5 py-0.5 rounded text-[10px] bg-amber-800/60 text-amber-300">AMARAN ' + earliest.expiry + '</span>';
            }
          }
          const lowStock = wh > 0 && p.min_stok_wh > 0 && wh < p.min_stok_wh;
          // batch breakdown (respek tapisan lokasi) — susun paling hampir luput di atas
          let detailBatches = (lok ? p.batches.filter(b => b.lokasi === lok) : p.batches);
          if (!showEmpty) detailBatches = detailBatches.filter(b => b.qty > 0);
          detailBatches = detailBatches.slice().sort((a, b) => (a.expiry || '9999-99-99') < (b.expiry || '9999-99-99') ? -1 : 1);
          const hasBatches = detailBatches.length > 0;
          const chev = hasBatches
            ? `<span class="stok-chev inline-block w-3 text-gray-500 transition-transform">▸</span>`
            : `<span class="inline-block w-3"></span>`;
          const mainRow = `<tr class="stok-row border-b border-gray-700 hover:bg-gray-600/20 ${hasBatches ? 'cursor-pointer' : ''}" ${hasBatches ? `data-sku="${esc(p.sku)}"` : ''}>
            <td class="px-3 py-2 font-mono text-xs text-brand-400 whitespace-nowrap">${chev} ${esc(p.sku)}</td>
            <td class="px-3 py-2 text-sm">${esc(p.nama)}</td>
            <td class="px-3 py-2 text-xs text-gray-500 hidden sm:table-cell">${esc(p.kategori)}</td>
            <td class="px-3 py-2 text-sm text-right whitespace-nowrap ${wh === 0 ? 'text-gray-600' : lowStock ? 'text-amber-400 font-semibold' : 'text-gray-100'}">${wh}${lowStock ? ` <span class="ml-1 px-1.5 py-0.5 rounded text-[9px] font-bold bg-amber-500/15 text-amber-400 align-middle" title="Bawah minimum (${p.min_stok_wh})">⚠ RENDAH</span>` : ''}</td>
            <td class="px-3 py-2 text-sm text-right ${outletTotal === 0 ? 'text-gray-600' : 'text-gray-200'}">${outletTotal}</td>
            <td class="px-3 py-2 text-right whitespace-nowrap">${sekat > 0 ? `<span class="px-1.5 py-0.5 rounded text-[10px] bg-gray-700 text-gray-400 mr-1" title="${sekat} unit disekat dari jualan">🔒 ${sekat}</span>` : ''}${expiryBadge || (sekat === 0 && p.total_qty === 0 && p.aktif === 'YES' ? '<span class="text-gray-600 text-xs">—</span>' : '')}</td>
          </tr>`;
          let detailRow = '';
          if (hasBatches) {
            // satu baris batch (lokasi dah ada di tajuk kumpulan)
            const batchRow = (b) => {
              const d = daysLeft(b.expiry);
              const expired = d !== null && d < 0;
              const depleted = b.qty <= 0;
              const isSekat = b.lokasi === 'SEKAT';
              const dim = depleted || (expired && !isSekat);
              const rightTag = depleted
                ? `<span class="px-1.5 py-0.5 rounded text-[10px] font-semibold bg-gray-700 text-gray-500">HABIS</span>`
                : expiryPill(b.expiry);
              let actBtn = '';
              if (isAdmin && b.qty > 0) {
                if (b.lokasi === 'WAREHOUSE') actBtn = `<button class="batch-act text-[10px] px-2 py-0.5 rounded bg-amber-500/15 text-amber-400 hover:bg-amber-500/30 transition" data-act="sekat" data-batch="${esc(b.batch_id)}">🔒 Sekat</button>`;
                else if (isSekat) actBtn = `<button class="batch-act text-[10px] px-2 py-0.5 rounded bg-green-500/15 text-green-400 hover:bg-green-500/30 transition" data-act="buka" data-batch="${esc(b.batch_id)}">🔓 Buka</button>`;
              }
              return `
              <div class="flex items-center justify-between gap-2 py-1.5 border-b border-gray-700/30 last:border-0 ${dim ? 'opacity-50' : ''}">
                <span class="text-xs flex items-center gap-2 min-w-0">
                  <span class="font-mono text-gray-300 ${dim ? 'line-through' : ''}">${esc(b.batch_no || b.batch_id)}</span>
                  ${b.expiry ? `<span class="text-gray-600">·</span> <span class="text-gray-500">exp ${esc(b.expiry)}</span>` : ''}
                </span>
                <span class="flex items-center gap-2 shrink-0">
                  ${rightTag}
                  <span class="text-xs ${depleted ? 'text-gray-500' : 'text-gray-200'} font-semibold w-14 text-right">${b.qty} unit</span>
                  ${actBtn}
                </span>
              </div>`;
            };
            // kumpul ikut lokasi: WAREHOUSE dahulu, SEKAT, kemudian lain
            const groups = {};
            detailBatches.forEach(b => { (groups[b.lokasi] = groups[b.lokasi] || []).push(b); });
            const rank = l => l === 'WAREHOUSE' ? 0 : l === 'SEKAT' ? 1 : l === 'ROSAK' ? 3 : 2;
            const lokLabel = l => l === 'WAREHOUSE' ? '📦 Warehouse (boleh jual)' : l === 'SEKAT' ? '🔒 Disekat' : l === 'ROSAK' ? '⚠ Rosak' : ('🏪 Outlet ' + l + (_outMap[l] ? ' · ' + _outMap[l] : ''));
            const lokColor = l => l === 'WAREHOUSE' ? 'text-gray-400' : l === 'SEKAT' ? 'text-amber-400/80' : 'text-gray-600';
            const sections = Object.keys(groups).sort((a, b) => rank(a) - rank(b) || (a < b ? -1 : 1)).map(lk => {
              const list = groups[lk].slice().sort((a, b) => (a.expiry || '9999-99-99') < (b.expiry || '9999-99-99') ? -1 : 1);
              return `<div class="mb-3 last:mb-0">
                <p class="text-[10px] uppercase tracking-wider font-semibold ${lokColor(lk)} mb-1">${lokLabel(lk)} · ${list.length} batch</p>
                ${list.map(batchRow).join('')}
              </div>`;
            }).join('');
            detailRow = `<tr class="stok-detail hidden" data-detail="${esc(p.sku)}">
              <td colspan="6" class="px-3 py-3 bg-gray-800/40"><div class="pl-6 pr-2 ${detailBatches.length > 8 ? 'max-h-80 overflow-y-auto' : ''}">${sections}</div></td></tr>`;
          }
          return mainRow + detailRow;
        });

        document.getElementById('stokBody').innerHTML = `
          <div class="text-xs text-gray-500 mb-2">${filtered.length} produk ditunjuk · ${data.length} jumlah · <span class="text-gray-600">klik baris untuk lihat batch</span></div>
          <div class="overflow-x-auto rounded-xl border border-gray-700">
            <table class="w-full text-left">
              <thead><tr class="bg-gray-800 text-xs text-gray-400">
                <th class="px-3 py-2">SKU</th><th class="px-3 py-2">Nama</th>
                <th class="px-3 py-2 hidden sm:table-cell">Kategori</th>
                <th class="px-3 py-2 text-right">WH</th>
                <th class="px-3 py-2 text-right">Outlet</th>
                <th class="px-3 py-2 text-right">Expiry</th>
              </tr></thead>
              <tbody>${rows.join('') || '<tr><td colspan="6" class="px-3 py-8 text-center text-gray-600">Tiada rekod ditemui</td></tr>'}</tbody>
            </table>
          </div>`;

        // Toggle expand batch
        document.querySelectorAll('#stokBody .stok-row[data-sku]').forEach(row => {
          row.onclick = () => {
            const sku = row.dataset.sku;
            const detail = document.querySelector(`#stokBody .stok-detail[data-detail="${CSS.escape(sku)}"]`);
            const chev = row.querySelector('.stok-chev');
            if (!detail) return;
            const open = detail.classList.toggle('hidden');
            if (chev) chev.style.transform = open ? '' : 'rotate(90deg)';
          };
        });

        // Sekat / Buka batch (admin)
        document.querySelectorAll('#stokBody .batch-act').forEach(btn => {
          btn.onclick = async (e) => {
            e.stopPropagation();
            const act = btn.dataset.act, batchId = btn.dataset.batch;
            const msg = act === 'sekat'
              ? 'Sekat batch ini dari jualan? Stok dipindah ke lokasi SEKAT (FEFO akan skip).'
              : 'Buka semula batch ini ke WAREHOUSE (boleh dijual semula)?';
            if (!confirm(msg)) return;
            btn.disabled = true; btn.textContent = '…';
            try {
              const r = await api(act === 'sekat' ? 'sekatBatch' : 'bukaBatch', { batch_id: batchId });
              if (r.status !== 'SUCCESS') { toast(r.message || 'Gagal.', 'error'); btn.disabled = false; return; }
              toast(act === 'sekat' ? `Batch disekat (${r.doc_no}).` : `Batch dibuka semula (${r.doc_no}).`);
              _stokCache = null; loadStok(true);
            } catch { toast('Gagal sambung server.', 'error'); btn.disabled = false; }
          };
        });
      }

      document.getElementById('btnStokRefresh').onclick = () => { _stokCache = null; loadStok(true); };
      document.getElementById('stokQ').oninput = () => _stokCache && renderStokTable(_stokCache);
      document.getElementById('stokLok').onchange = () => _stokCache && renderStokTable(_stokCache);
      document.getElementById('stokShowEmpty').onchange = () => _stokCache && renderStokTable(_stokCache);
      loadStok(false);
    }

    // ===================== VIEW: MASTER & TETAPAN =====================
    let _masterTab = 'produk';

    function viewMaster(el) {
      el.className = 'p-4 sm:p-6 fade';
      const tabs = [['produk','Produk'],['ejen','Ejen'],['outlet','Outlet'],['staf','Staf'],['reward','Reward'],['tetapan','Tetapan']];
      const tabHtml = tabs.map(([k,l]) =>
        `<button data-tab="${k}" class="master-tab px-4 py-2 text-sm font-semibold rounded-t-lg transition ${_masterTab===k ? 'bg-gray-800 text-brand-400 border-b-2 border-brand-500' : 'text-gray-400 hover:text-gray-200'}">${l}</button>`
      ).join('');
      el.innerHTML = `
        <div class="w-full">
          <div class="flex gap-1 border-b border-gray-700 mb-4">${tabHtml}</div>
          <div id="masterContent"></div>
        </div>`;
      el.querySelectorAll('.master-tab').forEach(btn => {
        btn.onclick = () => { _masterTab = btn.dataset.tab; viewMaster(el); };
      });
      renderMasterTab(document.getElementById('masterContent'));
    }

    function renderMasterTab(el) {
      if (_masterTab === 'produk') renderMasterProduk(el);
      else if (_masterTab === 'ejen') renderMasterEjen(el);
      else if (_masterTab === 'outlet') renderMasterOutlet(el);
      else if (_masterTab === 'staf') renderMasterStaf(el);
      else if (_masterTab === 'reward') renderMasterReward(el);
      else if (_masterTab === 'tetapan') renderMasterTetapan(el);
    }

    // ---- PRODUK ----
    function renderMasterProduk(el) {
      const data = (state.master && state.master.produk) || [];
      const KATEGORI = ['PENJAGAAN DIRI','MINUMAN','MAKANAN','ALAT KESIHATAN','MERCHANDISE','LAIN'];
      el.innerHTML = `

        const isEdit = !!p;

            kategori: document.getElementById('mpKat').value,

        finally { saveBtn.disabled = false; saveBtn.textContent = 'Simpan'; }
      };

      function buildUplineDropdown() {
        const input = document.getElementById('mejUpline');
        const drop = document.getElementById('mejUplineDrop');

        function getGold() {
          return (state.master.ejen || []).filter(e => (e.tier === 'GOLD' || !e.tier) && e.aktif !== 'TIDAK');
        }

        function renderDrop(q) {
          const list = getGold().filter(e => !q || e.ejen_id.toLowerCase().includes(q) || e.nama.toLowerCase().includes(q));
          if (!list.length) {
            drop.innerHTML = '<div class="px-3 py-3 text-xs text-gray-400 text-center">Tiada ejen Gold</div>';
          } else {
            drop.innerHTML = list.map(e =>
              `<div class="upline-opt flex items-center gap-2.5 px-3 py-2.5 cursor-pointer hover:bg-gray-50 border-b border-gray-100 last:border-0" data-id="${esc(e.ejen_id)}">

                <span class="text-sm text-gray-800">${esc(e.nama)}</span>
              </div>`
            ).join('');
            drop.querySelectorAll('.upline-opt').forEach(opt => {
              opt.addEventListener('mousedown', ev => {
                ev.preventDefault();
                input.value = opt.dataset.id;
                drop.classList.add('hidden');
              });
            });
          }
          drop.classList.remove('hidden');
        }

        input.addEventListener('focus', () => { if (!input.disabled) renderDrop(input.value.toLowerCase()); });
        input.addEventListener('input', () => renderDrop(input.value.toLowerCase()));
        input.addEventListener('blur', () => setTimeout(() => drop.classList.add('hidden'), 150));
      }

    async function _loadLeaderboard(containerId, myEjenId) {
      const wrap = document.getElementById(containerId);
      if (!wrap) return;
      const MEDALS = ['🥇','🥈','🥉'];
      const BULAN_MY = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
      const today = klToday();
      const [curY, curM] = today.slice(0,7).split('-').map(Number);
      const defaultFilter = today.slice(0,7);
      function buildDropdown(earliestBulan) {
        const sel = document.getElementById(`${containerId}-sel`);
        if (!sel) return;
        const [eY, eM] = earliestBulan.split('-').map(Number);
        const opts = ['<option value="">— Pilih Bulan —</option>'];
        let yr = curY, mo = curM;
        while (yr > eY || (yr === eY && mo >= eM)) {
          const val = `${yr}-${String(mo).padStart(2,'0')}`;
          opts.push(`<option value="${val}">${BULAN_MY[mo-1]} ${yr}</option>`);
          mo--;
          if (mo <= 0) { mo = 12; yr--; }
        }
        sel.innerHTML = opts.join('');
      }
      function setSegActive(type) {
        const bIni = document.getElementById(`${containerId}-bini`);
        const bSemua = document.getElementById(`${containerId}-bsemua`);
        const sel = document.getElementById(`${containerId}-sel`);
        const baseIni = 'px-3 py-1.5 text-xs font-medium transition rounded-l-md';

    // Resize gambar di pelayar (jimat saiz upload) → data URL JPEG
    function _resizeImage(file, maxDim, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxDim || h > maxDim) {
              if (w > h) { h = Math.round(h * maxDim / w); w = maxDim; }
              else { w = Math.round(w * maxDim / h); h = maxDim; }
            }
            const c = document.createElement('canvas'); c.width = w; c.height = h;
            c.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(c.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }
