    // ===================== EJEN: BUAT ORDER =====================
    async function ejOrder(el) {
      el.className = 'p-4 sm:p-6 fade';
      let _produk = [], _lines = [], _stokMap = {};
      const _tier = String(state.staf.tier || 'GOLD').toUpperCase() === 'SILVER' ? 'EJEN2' : 'EJEN1';

      _produk = ((state.master && state.master.produk) || []).filter(p => p.aktif !== 'NO');
      if (!_produk.length) { el.innerHTML = `<p class="text-gray-500 text-sm p-4 text-center">Tiada produk aktif.</p>`; return; }

      function getUnitPrice(p) {
        return _tier === 'EJEN2' ? Number(p.harga_ejen_2_rm) : Number(p.harga_ejen_1_rm);
      }
      function stokBadge(sku) {
        const s = _stokMap[sku] || 'TERSEDIA';
        if (s === 'HABIS') return `<span class="text-[10px] font-semibold text-red-400 bg-red-500/10 border border-red-500/30 rounded px-1.5 py-0.5">Habis</span>`;
        if (s === 'RENDAH') return `<span class="text-[10px] font-semibold text-amber-400 bg-amber-500/10 border border-amber-500/30 rounded px-1.5 py-0.5">Rendah</span>`;
        return '';
      }
      function subtotal() { return _lines.reduce((s,l) => s + l.qty * l.harga_rm, 0); }
      function renderLines() {
        const tb = document.getElementById('ejOrdLines');
        if (!_lines.length) { tb.innerHTML = `<tr><td colspan="4" class="py-5 text-center text-xs text-gray-500">Belum ada produk dipilih.</td></tr>`; }
        else tb.innerHTML = _lines.map((l,i) => `
          <tr class="border-b border-gray-700/40">
            <td class="px-2 py-2 text-xs text-gray-200">${esc(l.nama)}<p class="text-[10px] text-gray-500 font-mono">${esc(l.sku)}</p></td>
            <td class="px-2 py-2"><div class="flex items-center gap-1">
              <button class="eo-minus w-6 h-6 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm font-bold" data-i="${i}">−</button>
              <span class="w-8 text-center text-xs font-bold text-gray-100 eo-qty">${l.qty}</span>
              <button class="eo-plus w-6 h-6 bg-gray-700 rounded text-gray-300 hover:bg-gray-600 text-sm font-bold" data-i="${i}">+</button>
            </div></td>
            <td class="px-2 py-2 text-xs text-right text-gray-300">${rm(l.harga_rm)}</td>
            <td class="px-2 py-2 text-xs text-right font-semibold text-gray-100">${rm(l.qty * l.harga_rm)}</td>
          </tr>`).join('');
        document.querySelectorAll('.eo-plus').forEach(b => b.onclick = () => { _lines[+b.dataset.i].qty++; renderLines(); updateTotal(); });
        document.querySelectorAll('.eo-minus').forEach(b => b.onclick = () => { const i = +b.dataset.i; _lines[i].qty--; if (_lines[i].qty <= 0) _lines.splice(i,1); renderLines(); updateTotal(); });
      }
      function updateTotal() { document.getElementById('ejOrdTotal').textContent = rm(subtotal()); }

      el.innerHTML = `
        <h2 class="text-base font-bold text-gray-100 mb-4">Buat Order</h2>
        <div class="grid lg:grid-cols-[1fr_320px] gap-4">
          <div class="space-y-4">
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-4">
              <div class="flex items-center gap-3 mb-3 flex-wrap">
                <h3 class="text-sm font-semibold text-gray-200 flex-1">Produk</h3>
                <span class="text-xs text-gray-500 font-mono">${_tier === 'EJEN2' ? 'Harga Silver' : 'Harga Gold'}</span>
                <button id="ejStokRefresh" class="flex items-center gap-1 px-2 py-1 bg-gray-700 hover:bg-gray-600 rounded-lg text-xs text-gray-300 transition">↻ Semak Stok</button>
              </div>
              <div id="ejStokStatus" class="mb-2 text-[10px] text-gray-600"></div>
              <div class="mb-3"><input id="ejProdCari" type="text" placeholder="Cari produk…" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:outline-none" /></div>
              <div id="ejProdList" class="space-y-1 max-h-64 overflow-y-auto pr-1"></div>
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden">
              <table class="w-full text-left">
                <thead><tr class="border-b border-gray-700 text-[10px] uppercase text-gray-500">
                  <th class="px-2 py-2.5">Produk</th><th class="px-2 py-2.5">Qty</th>
                  <th class="px-2 py-2.5 text-right">Harga</th><th class="px-2 py-2.5 text-right">Jumlah</th>
                </tr></thead>
                <tbody id="ejOrdLines"></tbody>
              </table>
            </div>
          </div>
          <div class="space-y-4">
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-4 space-y-3">
              <h3 class="text-sm font-semibold text-gray-200">Ringkasan</h3>
              <div class="flex justify-between text-sm"><span class="text-gray-400">Subtotal</span><span id="ejOrdTotal" class="font-bold text-gray-100">RM 0.00</span></div>
              <hr class="border-gray-700"/>
              <div><label class="text-xs text-gray-500 mb-1 block">Catatan (pilihan)</label>
                <textarea id="ejOrdCatatan" rows="3" placeholder="Contoh: hantar ke alamat…" class="w-full px-3 py-2 bg-gray-900 border border-gray-700 rounded-xl text-sm focus:outline-none resize-none"></textarea>
              </div>
              <button id="ejOrdSubmit" class="w-full py-2.5 bg-gray-100 text-white text-sm font-bold rounded-xl hover:bg-gray-200 transition">Hantar Order →</button>
              <p class="text-[10px] text-gray-500 text-center">Order akan disemak oleh admin sebelum diproses.</p>
            </div>
          </div>
        </div>`;

      async function fetchStok() {
        const btn = document.getElementById('ejStokRefresh');
        const statusEl = document.getElementById('ejStokStatus');
        if (btn) { btn.disabled = true; btn.textContent = '↻ Memuatkan…'; }
        try {
          const res = await api('getStokEjen', {});
          if (res.status === 'SUCCESS') {
            _stokMap = {};
            (res.stok || []).forEach(s => { _stokMap[s.sku] = s.status; });
            if (statusEl) statusEl.textContent = `Stok dikemaskini · ${new Date().toLocaleTimeString('ms-MY', {hour:'2-digit',minute:'2-digit'})}`;
          }
        } catch { if (statusEl) statusEl.textContent = 'Gagal semak stok.'; }
        finally { if (btn) { btn.disabled = false; btn.textContent = '↻ Semak Stok'; } }
        renderProduk(document.getElementById('ejProdCari')?.value || '');
      }

      function renderProduk(q) {
        const f = _produk.filter(p => !q || p.nama.toLowerCase().includes(q.toLowerCase()) || (p.sku||'').toLowerCase().includes(q.toLowerCase()));
        const pl = document.getElementById('ejProdList');
        if (!f.length) { pl.innerHTML = `<p class="text-xs text-gray-500 py-2 text-center">Tiada produk ditemui.</p>`; return; }
        pl.innerHTML = f.map(p => {
          const habis = (_stokMap[p.sku] || 'TERSEDIA') === 'HABIS';
          return `<button class="ej-padd flex items-center justify-between w-full px-3 py-2 rounded-xl transition text-left gap-2 ${habis ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-900'}" data-sku="${esc(p.sku)}" data-nama="${esc(p.nama)}" data-harga="${getUnitPrice(p)}" data-habis="${habis}" ${habis ? 'disabled' : ''}>
            <span class="text-xs text-gray-200 flex items-center gap-2">${esc(p.nama)}<span class="text-[10px] text-gray-500 font-mono">${esc(p.sku)}</span>${stokBadge(p.sku)}</span>
            <span class="text-xs font-bold text-gray-400 shrink-0">${rm(getUnitPrice(p))}</span>
          </button>`;
        }).join('');
        document.querySelectorAll('.ej-padd').forEach(b => b.onclick = () => {
          if (b.dataset.habis === 'true') return;
          const sku = b.dataset.sku, nama = b.dataset.nama, harga = parseFloat(b.dataset.harga)||0;
          const existing = _lines.find(l => l.sku === sku);
          if (existing) existing.qty++; else _lines.push({ sku, nama, qty: 1, harga_rm: harga });
          renderLines(); updateTotal();
          document.getElementById('ejProdCari').value = '';
          renderProduk('');
        });
      }

      document.getElementById('ejStokRefresh').onclick = fetchStok;
      document.getElementById('ejProdCari').oninput = e => renderProduk(e.target.value);
      document.getElementById('ejOrdSubmit').onclick = async () => {
        if (!_lines.length) { toast('Sila pilih sekurang-kurangnya 1 produk.', 'error'); return; }
        const btn = document.getElementById('ejOrdSubmit');
        btn.disabled = true; btn.textContent = 'Menghantar…';
        try {
          const res = await api('submitOrderEjen', { tier_harga: _tier, lines: _lines, catatan: document.getElementById('ejOrdCatatan').value.trim() });
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal hantar order.', 'error'); return; }
          toast(`Order berjaya dihantar — ${res.order_id}`);
          _lines = []; renderLines(); updateTotal();
          document.getElementById('ejOrdCatatan').value = '';
          fetchStok();
        } catch { toast('Tak dapat sambung server.', 'error'); }
        finally { btn.disabled = false; btn.textContent = 'Hantar Order →'; }
      };
      renderProduk('');
      renderLines();
      fetchStok();
    }

    // ===================== EJEN: ORDER SAYA =====================
    async function ejOrders(el) {
      el.className = 'p-4 sm:p-6 fade';
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan order…</div>`;
      try {
        const res = await api('getMyOrders', {});
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm p-4">${esc(res.message||'Gagal.')}</p>`; return; }
        const orders = res.orders || [];
        function badge(s) {
          return s === 'PENDING'  ? `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-500/15 text-amber-400">PENDING</span>`
               : s === 'APPROVED' ? `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-green-500/15 text-green-400">APPROVED</span>`
               : `<span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-red-500/15 text-red-400">REJECTED</span>`;
        }
        // banding permintaan asal vs DO diluluskan (untuk APPROVED)
        function approvedHtml(o) {
          const orig = Array.isArray(o.lines) ? o.lines : [];
          const ap = o.approved;
          if (!ap) return `<p class="text-[10px] text-green-400 mt-2">✓ DO dikeluarkan: ${esc(o.doc_id || '')}</p>`;
          const origMap = {}; orig.forEach(l => origMap[l.sku] = l);
          const apMap = {}; (ap.lines || []).forEach(l => apMap[l.sku] = l);
          const skus = [...new Set([...orig.map(l => l.sku), ...(ap.lines || []).map(l => l.sku)])];
          let changed = false;
          const rows = skus.map(sku => {
            const o1 = origMap[sku], a1 = apMap[sku];
            const nama = (a1 && a1.nama) || (o1 && o1.nama) || sku;
            const oq = o1 ? o1.qty : 0, oh = o1 ? Number(o1.harga_rm) : 0;
            const aq = a1 ? a1.qty : 0, ah = a1 ? Number(a1.harga_seunit_rm) : 0;
            const diff = !o1 || !a1 || oq !== aq || Math.abs(oh - ah) > 0.001;
            if (diff) changed = true;
            return `<tr class="border-b border-gray-700/30">
              <td class="py-1.5 text-xs text-gray-300">${esc(nama)}<span class="block text-[10px] text-gray-600 font-mono">${esc(sku)}</span></td>
              <td class="py-1.5 text-xs text-right ${diff ? 'text-gray-500' : 'text-gray-400'}">${o1 ? `${oq} × ${rm(oh)}` : '—'}</td>
              <td class="py-1.5 text-xs text-right ${diff ? 'text-amber-300 font-semibold' : 'text-gray-300'}">${a1 ? `${aq} × ${rm(ah)}` : '<span class="text-red-400">dibuang</span>'}${diff && a1 ? ' ✎' : ''}</td>
            </tr>`;
          }).join('');
          const totalChanged = Math.abs(Number(o.jumlah_rm) - Number(ap.jumlah_bersih_rm)) > 0.001;
          return `
            ${changed || totalChanged ? `<div class="mb-2"><span class="px-2 py-0.5 text-[10px] font-bold rounded-full bg-amber-500/15 text-amber-400">✎ Dilaras oleh admin</span></div>` : ''}
            <table class="w-full mb-2">
              <thead><tr class="text-[9px] uppercase text-gray-500 border-b border-gray-700"><th class="py-1 text-left">Produk</th><th class="py-1 text-right">Anda Minta</th><th class="py-1 text-right">Diluluskan</th></tr></thead>
              <tbody>${rows}</tbody>
            </table>
            <div class="space-y-1 pt-2 border-t border-gray-700">
              ${totalChanged ? `<div class="flex justify-between text-xs"><span class="text-gray-500">Jumlah asal</span><span class="text-gray-500 line-through">${rm(o.jumlah_rm)}</span></div>` : ''}
              <div class="flex justify-between"><span class="text-xs text-gray-400">Jumlah diluluskan</span><span class="text-sm font-bold text-gray-100">${rm(ap.jumlah_bersih_rm)}</span></div>
              <div class="flex justify-between text-xs"><span class="text-gray-500">Dibayar / Baki</span><span class="${ap.baki_rm > 0 ? 'text-red-400' : 'text-green-400'}">${rm(ap.dibayar_rm)} / ${rm(ap.baki_rm)} · ${esc(ap.status_bayar)}</span></div>
            </div>
            <p class="text-[10px] text-green-400 mt-2">✓ DO dikeluarkan: ${esc(ap.doc_no)}</p>`;
        }

        // detail bahagian dalam (untuk modal)
        function detailHtml(o) {
          if (o.status === 'APPROVED') return approvedHtml(o);
          const lines = Array.isArray(o.lines) ? o.lines : JSON.parse(o.lines || '[]');
          return `<div class="space-y-1 mb-3">${lines.map(l => `<div class="flex justify-between text-sm"><span class="text-gray-300">${esc(l.nama)} <span class="text-gray-500 text-xs">×${l.qty}</span></span><span class="text-gray-400">${rm(l.qty * l.harga_rm)}</span></div>`).join('')}</div>
            <div class="flex items-center justify-between pt-2 border-t border-gray-700">
              <span class="text-xs text-gray-500">Jumlah</span><span class="text-base font-bold text-gray-100">${rm(o.jumlah_rm)}</span>
            </div>
            ${o.status === 'PENDING' ? `<p class="text-[11px] text-amber-400 mt-2">⏳ Menunggu kelulusan admin.</p>` : ''}
            ${o.status === 'REJECTED' && o.catatan_admin ? `<p class="text-[11px] text-red-400 mt-2">✗ Sebab: ${esc(o.catatan_admin)}</p>` : ''}`;
        }
        function openOrderDetail(o) {
          let modal = document.getElementById('ejOrdModal');
          if (!modal) { modal = document.createElement('div'); modal.id = 'ejOrdModal'; document.body.appendChild(modal); }
          modal.className = 'fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4';
          modal.onclick = (e) => { if (e.target === modal) modal.remove(); };
          modal.innerHTML = `<div class="bg-gray-900 border border-gray-700 rounded-2xl max-w-md w-full max-h-[85vh] overflow-y-auto p-5">
            <div class="flex items-center justify-between mb-3">
              <div><p class="font-mono text-xs text-gray-500">${esc(o.order_id)}</p><p class="text-xs text-gray-400">${esc(o.tarikh)}</p></div>
              <div class="flex items-center gap-2">${badge(o.status)}<button id="ejOrdClose" class="text-gray-500 hover:text-gray-300 text-2xl leading-none">×</button></div>
            </div>
            ${detailHtml(o)}
          </div>`;
          modal.querySelector('#ejOrdClose').onclick = () => modal.remove();
        }

        el.innerHTML = `<h2 class="text-base font-bold text-gray-100 mb-4">Order Saya (${orders.length})</h2>` + (!orders.length
          ? `<div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 text-center text-gray-500 text-sm">Tiada order lagi.<br><span class="text-xs">Tekan "Buat Order" untuk mula.</span></div>`
          : `<div class="space-y-2">${orders.map(o => {
              const total = (o.status === 'APPROVED' && o.approved) ? o.approved.jumlah_bersih_rm : o.jumlah_rm;
              const changed = o.status === 'APPROVED' && o.approved && Math.abs(Number(o.jumlah_rm) - Number(o.approved.jumlah_bersih_rm)) > 0.001;
              return `<div class="ejord-row bg-gray-800 border border-gray-700 rounded-2xl p-4 flex items-center justify-between gap-2 cursor-pointer hover:border-gray-600 transition" data-id="${esc(o.order_id)}">
                <div class="min-w-0">
                  <p class="text-xs font-mono text-gray-400">${esc(o.order_id)} <span class="text-gray-600">›</span></p>
                  <p class="text-xs text-gray-500 mt-0.5">${esc(o.tarikh)}${changed ? ' · <span class="text-amber-400">dilaras</span>' : ''}</p>
                </div>
                <div class="text-right shrink-0">
                  <p class="text-sm font-bold text-gray-100">${rm(total)}</p>
                  <div class="mt-0.5">${badge(o.status)}</div>
                </div>
              </div>`;
            }).join('')}</div>`);
        el.querySelectorAll('.ejord-row').forEach(r => r.onclick = () => openOrderDetail(orders.find(o => o.order_id === r.dataset.id)));
      } catch { el.innerHTML = `<p class="text-red-400 text-sm p-4">Gagal muat order.</p>`; }
    }

    // ===================== START =====================
    boot();
  </script>
</body>
</html>
