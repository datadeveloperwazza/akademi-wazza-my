  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },

        // Kod view ditulis semasa era tema gelap, jadi skala gray DISONGSANG
        // di sini — seluruh app bertukar tema dari SATU tempat ini sahaja:
        //   gray-900 = latar halaman & input (light gray)
        //   gray-800 = kad (putih) · gray-700 = border · gray-100 = teks utama
        // Warna accent (red/green/amber/…) shade 200-400 juga digelapkan
        // supaya teks accent kekal terbaca atas latar putih.
        colors: {
          gray: {
            950: '#ffffff', 900: '#f6f7f9', 800: '#ffffff', 700: '#e5e8ee',
            600: '#9ca3af', 500: '#6b7280', 400: '#4b5563', 300: '#374151',
            200: '#1f2937', 100: '#111827', 50: '#0b1220'
          },
          // brand = MONOCHROME (rujukan design SaaS): butang utama hitam,
          // accent teks slate gelap. Nak balik amber? 400:'#b45309' 500:'#b45309' 600:'#d97706'
          brand:  { 300: '#374151', 400: '#1f2937', 500: '#0f172a', 600: '#1f2937' },
          green:  { 300: '#047857', 400: '#059669', 700: '#86efac', 900: '#dcfce7' },
          red:    { 300: '#b91c1c', 400: '#dc2626', 700: '#fca5a5', 800: '#fecaca', 900: '#fee2e2' },
          amber:  { 200: '#92400e', 300: '#b45309', 400: '#d97706', 800: '#fde68a' },
          orange: { 300: '#c2410c', 400: '#ea580c' },
          pink:   { 300: '#be185d', 900: '#fce7f3' },
          purple: { 300: '#7e22ce' },
          sky:    { 300: '#0369a1', 400: '#0284c7' },
          blue:   { 700: '#bfdbfe', 900: '#dbeafe' }
        }
      } }
    };
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    /* design pass: rujukan SaaS minimalist (kosmetik sahaja, tiada perubahan fungsi) */
    input[type="search"] { border-radius: 9999px; }
    #view .rounded-xl, #view .rounded-2xl { box-shadow: 0 1px 2px rgba(16,24,40,.05); }
    .nav-link .nav-ic { opacity: .7; }
    .nav-link:hover .nav-ic, .nav-link.text-white .nav-ic { opacity: 1; }
    .spin { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .fade { animation: fade .25s ease; }
    @keyframes fade { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    /* cetak DO — A4/A5 */
    #printArea { display: none; }
    @media print {
      body { background: #fff !important; }
      body > *:not(#printArea) { display: none !important; }
      #printArea { display: block !important; position: absolute; top: 0; left: 0; width: 100%; color: #000; font-size: 12px; padding: 16px; }
      #printArea table { width: 100%; border-collapse: collapse; }
      #printArea th, #printArea td { border: 1px solid #999; padding: 4px 6px; text-align: left; }
      #printArea .pr-right { text-align: right; }
      #printArea .pr-sign { margin-top: 48px; }
    }
  </style>
</head>
<body class="bg-[#dfe5ec] text-gray-100 min-h-screen">

  <!-- ====== CONFIG: SUPABASE ====== -->
  <script>
    const SUPABASE_URL      = "https://odthrulkdycwaotkzzwa.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9kdGhydWxrZHljd2FvdGt6endhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE2NjY4MDcsImV4cCI6MjA5NzI0MjgwN30.cQrqagnJd4JWBX7mA9tYMlngNHexAQC16ojqRiEo94s";

  <!-- toast -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 z-50 hidden">

  <!-- kawasan cetak DO (diisi sebelum window.print) -->

  <script>
    // ===================== CONFIG / STATE =====================
    const CACHE_KEY = 'olinv2_session';
    const POST_ACTIONS = new Set([
      'login', 'logout',
      // write actions (M2+):
      'addGRN', 'addDOEjen', 'addTransfer', 'addJualanOutlet', 'addReturn', 'addPayment',
      'reallocatePayment', 'addPostage', 'voidDoc', 'voidPayment', 'createStockCount',
      'saveStockCount', 'approveStockCount', 'rejectStockCount', 'addLupus',
      'upsertProduk', 'upsertEjen', 'upsertOutlet', 'upsertStaff', 'saveSettings',
      'semakIntegriti', 'rebuildSnapshot', 'rebuildCounters', 'runBackupNow',
      'upsertAnnouncement', 'deleteAnnouncement', 'awardPoints'
    ]);

    const state = { token: null, staf: null, master: null };

    // ===================== TRANSPORT =====================
    // Semua call (baca & tulis) guna POST ke Edge Function — satu endpoint, sama interface dengan GAS.
    function callGAS(action, params) {
      params = params || {};
      const payload = Object.assign({ action }, params);
      if (state.token) payload.token = state.token;
      return fetch(API_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
        },
        body: JSON.stringify(payload)
      }).then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); });
    }

    // ===================== API CACHE =====================
    // Action baca yang selamat di-cache (TTL dalam minit). Mana-mana action TULIS
    // akan kosongkan SEMUA cache — data sentiasa fresh selepas transaksi.
    // SENGAJA TIADA: getLedger (audit — mesti live), getStockCount (sesi kiraan live).
    const CACHE_TTL_MIN = {
      getDashboard: 3, getDocList: 2, getDocDetail: 2,
      getAkaunRingkasan: 3, getStatementEjen: 3, getRingkasanBulanan: 5,
      getStock: 2, getExpiryAlerts: 3, getPosHariIni: 2, getAnomali: 3, getStaffList: 3, getLeaderboard: 3
    };
    const _apiCache = new Map(); // 'action|params' → { at, data }
    const CACHE_SS_KEY = 'olin_api_cache_v1';

    // Persist ke sessionStorage — cache survive F5, hilang bila tab tutup
    // (sengaja BUKAN localStorage: data kewangan tak patut kekal atas disk).
    function persistApiCache() {
      try {
        sessionStorage.setItem(CACHE_SS_KEY, JSON.stringify({
          tok: (state.token || '').slice(0, 16), e: [..._apiCache]
        }));
      } catch (e) { /* quota penuh → jalan tanpa persist */ }
    }
    function restoreApiCache() {
      try {
        const raw = sessionStorage.getItem(CACHE_SS_KEY);
        if (!raw) return;
        const o = JSON.parse(raw);
        // token lain (user lain login) → buang terus
        if (o.tok !== (state.token || '').slice(0, 16)) { sessionStorage.removeItem(CACHE_SS_KEY); return; }
        (o.e || []).forEach(([k, v]) => {
          const ttl = CACHE_TTL_MIN[k.split('|')[0]];
          if (ttl && v && Date.now() - v.at < ttl * 60000) _apiCache.set(k, v);
        });
      } catch (e) { sessionStorage.removeItem(CACHE_SS_KEY); }
    }
    function clearApiCache() {
      _apiCache.clear();
      try { sessionStorage.removeItem(CACHE_SS_KEY); } catch (e) {}
    }
    function bustCache(action) {
      [..._apiCache.keys()].forEach(k => { if (k.startsWith(action + '|')) _apiCache.delete(k); });
      persistApiCache();
    }

    async function api(action, params, opts) {
      const ttl = CACHE_TTL_MIN[action];
      const key = action + '|' + JSON.stringify(params || {});
      if (ttl && !(opts && opts.fresh)) {
        const hit = _apiCache.get(key);
        if (hit && Date.now() - hit.at < ttl * 60000) return hit.data;
      }
      const data = await callGAS(action, params);
      if (data && data.status === 'ERROR' && data.code === 'AUTH') { logoutLocal(); renderLogin(); throw new Error('AUTH'); }
      if (POST_ACTIONS.has(action)) clearApiCache(); // tulis → buang semua cache baca
      else if (ttl && data && data.status === 'SUCCESS') { _apiCache.set(key, { at: Date.now(), data }); persistApiCache(); }
      return data;
    }

    // ===================== UTIL =====================
    function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function rm(n) { return 'RM ' + (Number(n) || 0).toLocaleString('en-MY', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function klToday() { return new Date(Date.now() + 8 * 3600000).toISOString().slice(0, 10); } // tarikh KL (UTC+8)
    function _sortBy(list, col, dir) {
      return [...list].sort((a, b) => {
        const av = a[col] ?? '', bv = b[col] ?? '';
        const cmp = (typeof av === 'number' && typeof bv === 'number') ? av - bv : String(av).localeCompare(String(bv), 'ms');
        return dir === 'asc' ? cmp : -cmp;
      });
    }
    function _th(label, col, sort, cls = '') {
      const active = sort.col === col;
      const arrow = active ? (sort.dir === 'asc' ? ' ▲' : ' ▼') : ' ⇅';
      return `<th data-sort="${col}" class="px-3 py-2 cursor-pointer select-none hover:text-gray-200${cls ? ' ' + cls : ''}"><span class="${active ? 'text-brand-400' : ''}">${label}</span><span class="ml-0.5 text-[9px] ${active ? 'text-brand-400' : 'text-gray-600'}">${arrow}</span></th>`;
    }
    function spinner(t) { return `<div class="py-12 text-center text-gray-500 text-sm"><span class="spin inline-block mr-2">⏳</span>${esc(t || 'Memuatkan…')}</div>`; }
    // ikon SVG line-style (stroke ikut currentColor — auto sesuai warna teks)
    const ICO = {
      home: '<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
      chart: '<path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/>',
      box: '<path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/>',
      wallet: '<path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/>',
      file: '<path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
      download: '<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>',
      truck: '<path d="M14 18V6a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v11a1 1 0 0 0 1 1h2"/><path d="M15 18H9"/><path d="M19 18h2a1 1 0 0 0 1-1v-3.65a1 1 0 0 0-.22-.624l-3.48-4.35A1 1 0 0 0 17.52 8H14"/><circle cx="17" cy="18" r="2"/><circle cx="7" cy="18" r="2"/>',
      send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
      repeat: '<path d="m17 2 4 4-4 4"/><path d="M3 11v-1a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v1a4 4 0 0 1-4 4H3"/>',
      bag: '<path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/>',
      undo: '<polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/>',
      clipboard: '<rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/>',
      book: '<path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>',
      settings: '<path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>',
      banknote: '<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01"/><path d="M18 12h.01"/>',
      refresh: '<path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/>',
      alert: '<path d="m21.73 18-8-14a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>',
      check: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/>',
      lock: '<rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>',
      wrench: '<path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>'
    };
    function ico(n, cls) { return `<svg class="${cls || 'w-[18px] h-[18px]'}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICO[n] || ICO.box}</svg>`; }
    function emptyState(icon, title, sub, href, label) {
      const vis = ICO[icon]
        ? `<div class="w-14 h-14 mx-auto mb-4 rounded-2xl bg-gray-900 border border-gray-700 flex items-center justify-center text-gray-500">${ico(icon, 'w-6 h-6')}</div>`
        : `<div class="text-5xl mb-4">${icon}</div>`;
      return `<div class="max-w-xl mx-auto text-center py-16">${vis}<h2 class="text-xl font-bold text-gray-200">${esc(title)}</h2><p class="text-gray-500 mt-2 text-sm">${esc(sub)}</p>${href ? `<a href="${href}" class="inline-block mt-5 px-4 py-2 bg-brand-600 text-gray-900 font-bold rounded-lg text-sm">→ ${esc(label)}</a>` : ''}</div>`;
    }
    function prodOptGroups(list) {
      const byKat = {};
      list.forEach(p => { const k = p.kategori || 'LAIN'; (byKat[k] = byKat[k] || []).push(p); });
      return Object.keys(byKat).sort().map(k =>
        `<optgroup label="${esc(k)}">${byKat[k].map(p => `<option value="${esc(p.sku)}" data-nama="${esc(p.nama)}" data-exp="${esc(p.ada_expiry)}" data-c1="${Number(p.harga_cust_1_rm) || 0}" data-c2="${Number(p.harga_cust_2_rm) || 0}" data-e1="${Number(p.harga_ejen_1_rm) || 0}" data-e2="${Number(p.harga_ejen_2_rm) || 0}">${esc(p.sku)} — ${esc(p.nama)}</option>`).join('')}</optgroup>`
      ).join('');
    }
    function toast(msg, type) {
      const box = document.getElementById('toastBox'), wrap = document.getElementById('toast');
      box.textContent = msg;
      box.className = 'px-4 py-2.5 rounded-lg shadow-lg text-sm font-semibold ' +
        (type === 'error' ? 'bg-red-600 text-white' : type === 'warn' ? 'bg-amber-500 text-gray-900' : 'bg-green-600 text-white');
      wrap.classList.remove('hidden');
      clearTimeout(toast._t); toast._t = setTimeout(() => wrap.classList.add('hidden'), 3200);
    }
    function saveSession() { localStorage.setItem(CACHE_KEY, JSON.stringify({ token: state.token, staf: state.staf })); }
    function logoutLocal() { state.token = null; state.staf = null; state.master = null; localStorage.removeItem(CACHE_KEY); clearApiCache(); }

    // ===================== BOOT =====================
    async function boot() {
      if (!SUPABASE_URL || !SUPABASE_ANON_KEY) return renderConfigBanner();
      const raw = localStorage.getItem(CACHE_KEY);
      if (raw) {
        try { const s = JSON.parse(raw); state.token = s.token; state.staf = s.staf; } catch (e) {}
      }
      restoreApiCache(); // pulihkan cache API selepas F5 (token mesti padan)
      if (state.token) {
        try {
          const res = await api('getBootstrap', {});
          if (res.status === 'SUCCESS') { state.master = res; state.staf = res.staf; saveSession(); return state.staf.role === 'EJEN' ? renderEjenPortal() : renderShell(); }
        } catch (e) { if (e.message === 'AUTH') return; }
      }
      renderLogin();
    }

    function renderConfigBanner() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6">
          <div class="max-w-md bg-gray-800 border border-gray-700 rounded-xl p-6 text-center">
            <div class="w-12 h-12 mx-auto mb-3 rounded-2xl bg-gray-900 border border-gray-700 flex items-center justify-center text-gray-400">${ico('settings', 'w-6 h-6')}</div>
            <h1 class="text-lg font-bold text-brand-400 mb-2">Belum dikonfigurasi</h1>
            <p class="text-sm text-gray-400">Tampal URL Web App (<code>.../exec</code>) ke dalam pemalar
            <code class="text-brand-400">GAS_URL</code> di bahagian atas <code>index.html</code>, kemudian muat semula.</p>
            <p class="text-xs text-gray-500 mt-3">Rujuk <code>SETUP.md</code> untuk langkah deploy.</p>
          </div>
        </div>`;
    }

    // ===================== LOGIN =====================
    function renderLogin() {
      document.getElementById('app').innerHTML = `
        <div class="min-h-screen flex items-center justify-center p-6">
          <div class="w-full max-w-sm fade">
            <div class="flex items-center justify-center gap-2.5 mb-8">
              <div class="w-9 h-9 rounded-xl bg-brand-600 flex items-center justify-center text-white font-black text-base">O</div>
              <div class="leading-tight">
                <div class="text-lg font-extrabold text-gray-100 tracking-tight">Olin Beauty</div>
                <div class="text-[10px] text-gray-500 tracking-wide">SISTEM INVENTORI</div>
              </div>
            </div>
            <div class="bg-gray-800 border border-gray-700 rounded-2xl p-7 shadow-sm">
              <h2 class="text-sm font-bold text-gray-100 mb-5">Log masuk ke akaun anda</h2>
              <label class="block text-xs font-medium text-gray-400 mb-1.5">ID Staf</label>
              <input id="inStaff" type="text" autocomplete="username" placeholder="STF-01"
                class="w-full mb-4 px-3.5 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none transition" />
              <label class="block text-xs font-medium text-gray-400 mb-1.5">PIN</label>
              <input id="inPin" type="password" inputmode="numeric" autocomplete="current-password" placeholder="••••••"
                class="w-full mb-6 px-3.5 py-2.5 bg-gray-900 border border-gray-700 rounded-lg text-sm tracking-widest focus:border-brand-500 focus:outline-none transition" />
              <button id="btnLogin"
                class="w-full py-2.5 bg-brand-600 hover:bg-brand-500 text-white font-semibold text-sm rounded-lg transition">
                Log Masuk
              </button>
            </div>
            <p class="text-center text-[11px] text-gray-500 mt-5">Olin Beauty Inventori v2 · Wazza Digital</p>
          </div>
        </div>`;
      const doLogin = async () => {
        const staff_id = document.getElementById('inStaff').value.trim();
        const pin = document.getElementById('inPin').value.trim();
        if (!staff_id || !pin) return toast('Isi ID dan PIN.', 'warn');
        const btn = document.getElementById('btnLogin');
        btn.disabled = true; btn.textContent = 'Menyemak…';
        try {
          const res = await callGAS('login', { staff_id, pin });
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal log masuk.', 'error'); btn.disabled = false; btn.textContent = 'Log Masuk'; return; }
          state.token = res.token; state.staf = { staff_id, nama: res.nama, role: res.role, outlet_id: res.outlet_id, ejen_id: res.ejen_id || '' };
          saveSession();
          const b = await api('getBootstrap', {});
          state.master = b; state.staf = b.staf; saveSession();
          toast('Selamat datang, ' + res.nama + '!');
          if (state.staf.role === 'EJEN') { renderEjenPortal(); } else { renderShell(); }
        } catch (e) {
          toast('Tak dapat sambung ke pelayan.', 'error'); btn.disabled = false; btn.textContent = 'Log Masuk';
        }
      };
      document.getElementById('btnLogin').onclick = doLogin;
      document.getElementById('inPin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

      document.getElementById('btnLogout').onclick = async () => {

    function router() {
      const h = (location.hash.replace(/^#\/?/, '') || '').split('?')[0];
      const found = NAV.flatMap(g => g.items).find(i => i[0] === h);
      const title = found ? found[1] : 'Hari Ini';
      const titleEl = document.getElementById('viewTitle'); if (titleEl) titleEl.textContent = title;
      // tutup drawer mobile
      const sb = document.getElementById('sidebar'), scrim = document.getElementById('scrim');
      if (sb) sb.classList.add('-translate-x-full'); if (scrim) scrim.classList.add('hidden');
      // highlight aktif — pill hitam (rujukan design SaaS)
      document.querySelectorAll('.nav-link').forEach(a => {
        const on = a.getAttribute('data-route') === h;
        a.classList.toggle('bg-gray-100', on);
        a.classList.toggle('text-white', on);
        a.classList.toggle('font-semibold', on);
        a.classList.toggle('text-gray-400', !on);
        a.classList.toggle('hover:bg-gray-900', !on);
        a.classList.toggle('hover:text-gray-100', !on);
      });
      // reset scroll kandungan ke atas (main = bekas scroll, bukan page)
      const mainEl = document.querySelector('main');
      if (mainEl) mainEl.scrollTop = 0;
      const view = document.getElementById('view');
      if (h === '') return viewHome(view);
      if (h === 'dashboard') return viewDashboard(view);
      if (h === 'stok') return viewStok(view);
      if (h === 'stok-masuk') return viewStokMasuk(view);
      if (h === 'do-baru') return viewDOEjen(view);
      if (h === 'ejen') return viewEjen(view);
      if (h === 'transfer') return viewTransfer(view);
      if (h === 'jualan-outlet') return viewJualan(view);
      if (h === 'return') return viewReturn(view);
      if (h === 'pos') return viewPos(view);
      if (h === 'dokumen') return viewDokumen(view);
      if (h === 'kiraan') return viewKiraan(view);
      if (h === 'ledger') return viewLedger(view);
      if (h === 'master') return viewMaster(view);
      if (!READY.has(h)) return viewSoon(view, title);
      viewSoon(view, title);
    }

    // ===================== VIEWS (M0) =====================

        : `<span class="px-2 py-0.5 rounded-full text-[10px] font-bold bg-red-500/15 text-red-300">● INTEGRITI MERAH · ${g.bil_anomali} anomali</span>`;

    // ===================== VIEW M6: DASHBOARD (S2) =====================
    function viewDashboard(el) {
      el.className = 'p-4 sm:p-6 fade';

      const bulanIni = klToday().slice(0, 7);

        const body = document.getElementById('dbBody');
        body.innerHTML = spinner('Mengira dashboard…');

          const res = await api('getDashboard', bulan ? { bulan } : {});
          if (res.status !== 'SUCCESS') { body.innerHTML = emptyState('alert', 'Gagal', res.message || ''); return; }
          document.getElementById('dbBadge').innerHTML = integritiBadge(res.integriti);
          const ex = res.expiry || {};
          let html = '';

          if (isAdmin && res.kpi) {
            html += `<div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
              ${[['NILAI STOK', res.kpi.nilai_stok_rm, 'text-gray-100'], ['JUALAN ' + esc(res.bulan), res.kpi.jualan_bulan_rm, 'text-green-400'],
                 ['KUTIPAN ' + esc(res.bulan), res.kpi.kutipan_bulan_rm, 'text-brand-400'], ['HUTANG TERTUNGGAK', res.kpi.hutang_tertunggak_rm, res.kpi.hutang_tertunggak_rm > 0 ? 'text-red-400' : 'text-gray-100']]

            if ((res.pending_payments || []).length) html += `

                  <span>${esc(p.nama)} <span class="text-[10px] text-gray-500">tertua ${esc(p.do_tertua)}</span></span>
                  <span class="font-bold text-red-400">${rm(p.hutang_rm)}</span></a>`).join('')}
              </div>`;
            if ((res.ranking_ejen || []).length) html += `
              <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 mb-4">

                  const pct = r.pct_capai;

                    ${pct !== null ? `<div class="h-1.5 bg-gray-700 rounded-full mt-1"><div class="h-1.5 rounded-full ${pct >= 100 ? 'bg-green-500' : pct >= 50 ? 'bg-amber-500' : 'bg-red-500'}" style="width:${Math.min(100, pct)}%"></div></div>` : ''}

          if (isAdmin) html += `<div id="dbLb" class="mb-4"></div>`;
          body.innerHTML = html || emptyState('chart', 'Tiada data lagi', 'Mula key-in transaksi untuk lihat dashboard.');
          if (isAdmin) _loadLeaderboard('dbLb', null);
          const btnR = document.getElementById('btnRingkasan');

                  </tr></thead>
                  <tbody>${r.bulanan.map(b => `<tr class="border-b border-gray-700/40">

      if (picker) picker.onchange = () => load(picker.value);
      document.getElementById('dbRefresh').onclick = () => {
        bustCache('getDashboard'); bustCache('getRingkasanBulanan');
        load(picker ? picker.value : undefined);
      };

      function addLine() {
        lineSeq++;
        const wrap = document.getElementById('rtLines');
        const div = document.createElement('div');
        div.className = 'rt-row bg-gray-900 border border-gray-700 rounded-lg p-3';
        div.innerHTML = `
          <div class="flex items-center justify-between mb-2"><span class="text-xs text-gray-500 font-semibold">Baris ${lineSeq}</span>
            <button type="button" class="btn-rm text-gray-600 hover:text-red-400 text-sm">✕</button></div>
          <div class="grid sm:grid-cols-2 gap-2 mb-2">
            <div><label class="block text-xs text-gray-500 mb-1">Produk *</label>
              <select class="ln-sku w-full px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none">${optHtml}</select></div>
            <div><label class="block text-xs text-gray-500 mb-1">Batch *</label>

              <input type="number" class="ln-qty w-full px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" min="1" step="1" /></div>
            <div><label class="block text-xs text-gray-500 mb-1">Tindakan *</label>
              <select class="ln-disp w-full px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none"><option value="RESTOCK">RESTOCK</option><option value="ROSAK">HAPUS KIRA</option></select></div>
            <div><label class="block text-xs text-gray-500 mb-1">Sebab</label>
              <select class="ln-sebab w-full px-2 py-1.5 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none"><option value="">-</option><option>BOCOR</option><option>EXPIRED</option><option>SILAP ORDER</option><option>LAIN</option></select></div>
          </div>
          <div class="ln-hint hidden text-xs text-amber-400 mt-1.5"></div>`;
        wrap.appendChild(div);
        const sku = div.querySelector('.ln-sku'), batch = div.querySelector('.ln-batch'), disp = div.querySelector('.ln-disp'), hint = div.querySelector('.ln-hint');
        sku.onchange = () => {
          const list = batchesBySku[sku.value] || [];
          batch.innerHTML = list.length ? ('<option value="">— Pilih batch —</option>' + list.map(b => `<option value="${esc(b.batch_id)}" data-exp="${esc(b.expiry)}" data-adaexp="${esc(b.ada_expiry)}">${esc(b.batch_no || b.batch_id)}${b.expiry ? ' · exp ' + esc(b.expiry) : ''}</option>`).join('')) : '<option value="">(tiada batch — buat GRN dulu)</option>';
          checkExp();
        };
        function checkExp() {
          const o = batch.options[batch.selectedIndex];
          const expired = o && o.dataset.adaexp === 'YES' && o.dataset.exp && o.dataset.exp < today;
          if (expired) { disp.value = 'ROSAK'; hint.textContent = 'Batch EXPIRED — dikunci ke HAPUS KIRA.'; hint.classList.remove('hidden'); }

      async function submit() {
        const errEl = document.getElementById('rtErr'); errEl.classList.add('hidden');
        const pihak_id = document.getElementById('rtPihak').value;
        const doc_no_asal = document.getElementById('rtDoAsal').value.trim();
        const tarikh = document.getElementById('rtTarikh').value;
        const catatan = document.getElementById('rtCatatan').value.trim();
        const beri_kredit = jenis === 'EJEN' ? document.getElementById('rtKredit').checked : false;
        if (!pihak_id) return fail('Sila pilih ' + (jenis === 'EJEN' ? 'ejen' : 'outlet') + '.');
        if (jenis === 'EJEN' && beri_kredit && !doc_no_asal) return fail('Beri kredit perlu DO asal.');
        const rows = document.querySelectorAll('#rtLines .rt-row'); if (!rows.length) return fail('Tambah barang.');
        const lines = [], seen = {};
        for (let i = 0; i < rows.length; i++) {
          const sku = rows[i].querySelector('.ln-sku').value, batch_id_rujukan = rows[i].querySelector('.ln-batch').value;
          const qty = parseInt(rows[i].querySelector('.ln-qty').value) || 0, disposisi = rows[i].querySelector('.ln-disp').value, sebab = rows[i].querySelector('.ln-sebab').value;
          if (!sku) return fail('Baris ' + (i + 1) + ': pilih produk.');
          if (!batch_id_rujukan) return fail('Baris ' + (i + 1) + ': pilih batch.');
          if (qty <= 0) return fail('Baris ' + (i + 1) + ': qty mesti > 0.');
          const k = sku + '|' + batch_id_rujukan; if (seen[k]) return fail('Baris ' + (i + 1) + ': produk+batch berulang — gabungkan ke satu baris.'); seen[k] = true;
          lines.push({ sku, qty, disposisi, batch_id_rujukan, sebab });
        }
        if (!clientRef) clientRef = (crypto.randomUUID ? crypto.randomUUID() : 'r' + Date.now());
        const btn = document.getElementById('rtSubmit'); btn.disabled = true; btn.textContent = 'MENYIMPAN...';
        try {
          const res = await api('addReturn', { jenis, pihak_id, doc_no_asal, tarikh, catatan, beri_kredit, lines, client_ref: clientRef });
          if (res.status !== 'SUCCESS') { errEl.textContent = res.message; errEl.classList.remove('hidden'); return; }
          _stokCache = null; renderSuccess(res);
        } catch (e) { errEl.textContent = 'Gagal sambung pelayan.'; errEl.classList.remove('hidden'); }
        finally { btn.disabled = false; btn.textContent = 'Simpan Return'; }
        function fail(m) { errEl.textContent = m; errEl.classList.remove('hidden'); return; }

          ${res.hutang_baru_rm !== null && res.hutang_baru_rm !== undefined ? `<div class="text-xs text-gray-500 mt-1">Hutang baru: ${rm(res.hutang_baru_rm)}</div>` : ''}

    // ===================== VIEW: EJEN & BAYARAN =====================

      // ---------- VOID bayaran ----------
      function doVoidPayment(payNo, ejenId) {
        const sebab = prompt('Sebab batal bayaran ' + payNo + ':');
        if (sebab === null) return;
        if (!sebab.trim()) { toast('Sebab diperlukan.', 'warn'); return; }
        api('voidPayment', { pay_no: payNo, sebab: sebab.trim() }).then(res => {
          if (res.status !== 'SUCCESS') { toast(res.message || 'Gagal batal.', 'error'); return; }
          toast('Bayaran ' + payNo + ' dibatalkan.');
          openStatement(ejenId);
        }).catch(() => toast('Gagal sambung pelayan.', 'error'));
      }

      // ---------- LEVEL 3: modal bayaran ----------
      let payClientRef = null;
      function openPayModal(st, dosUnpaid) {
        payClientRef = null;
        const wrap = document.createElement('div');
        wrap.id = 'payModal';
        wrap.className = 'fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/70';
        wrap.innerHTML = `
          <div class="bg-gray-900 border border-gray-700 rounded-xl w-full max-w-lg max-h-[92vh] overflow-y-auto shadow-2xl">
            <div class="flex items-center justify-between px-5 py-4 border-b border-gray-700">

              <button id="payClose" class="text-gray-500 hover:text-gray-300 text-xl">×</button>
            </div>
            <div class="p-5 space-y-3">
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs text-gray-400 mb-1">Amaun (RM) *</label>
                  <input id="payAmaun" type="number" step="0.01" min="0" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" placeholder="0.00" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Kaedah *</label>
                  <select id="payKaedah" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none">
                    <option value="TUNAI">Tunai</option><option value="TRANSFER">Transfer</option><option value="CHEQUE">Cheque</option>
                  </select></div>
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div><label class="block text-xs text-gray-400 mb-1">Tarikh</label>
                  <input id="payTarikh" type="date" value="${klToday()}" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
                <div><label class="block text-xs text-gray-400 mb-1">Rujukan resit</label>
                  <input id="payRujukan" type="text" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" placeholder="cth MBB-8821" /></div>
              </div>

              <div>
                <div class="flex items-center justify-between mb-1">
                  <label class="block text-xs text-gray-400">Agihan ke DO (tertua dulu)</label>
                  <button id="payAuto" class="text-[11px] text-brand-400 hover:underline">↻ Auto-agih</button>
                </div>
                <div id="payDOs" class="space-y-1.5 max-h-52 overflow-y-auto">
                  ${dosUnpaid.length ? dosUnpaid.map(d => `
                    <div class="flex items-center gap-2 text-sm">
                      <div class="flex-1 min-w-0">
                        <span class="font-mono text-xs text-brand-400">${esc(d.doc_no)}</span>
                        <span class="text-[11px] text-gray-500">baki ${rm(d.baki_rm)}</span>
                      </div>
                      <input type="number" step="0.01" min="0" max="${d.baki_rm}" data-doc="${esc(d.doc_no)}" data-baki="${d.baki_rm}"
                        class="pay-alloc w-24 px-2 py-1 bg-gray-800 border border-gray-700 rounded text-sm text-right focus:border-brand-500 focus:outline-none" placeholder="0.00" />
                    </div>`).join('') : '<div class="text-xs text-gray-500 py-2">Tiada DO tertunggak — bayaran akan jadi deposit kredit (perlu Admin).</div>'}
                </div>
              </div>

              <div id="payOverflow" class="hidden text-xs"></div>
              <div><label class="block text-xs text-gray-400 mb-1">Catatan <span class="text-gray-600">(opt)</span></label>
                <input id="payCatatan" type="text" class="w-full px-3 py-2 bg-gray-800 border border-gray-700 rounded-lg text-sm focus:border-brand-500 focus:outline-none" /></div>
              <div id="payErr" class="hidden text-red-400 text-xs"></div>
              <button id="paySave" class="w-full py-2.5 bg-brand-600 hover:bg-brand-500 text-gray-900 font-bold rounded-lg transition">Simpan Bayaran</button>
            </div>
          </div>`;
        el.appendChild(wrap);

        const amaunEl = document.getElementById('payAmaun');
        const allocEls = () => Array.from(wrap.querySelectorAll('.pay-alloc'));

        function autoAgih() {
          let remain = Math.round((parseFloat(amaunEl.value) || 0) * 100);
          allocEls().forEach(inp => {
            const baki = Math.round((parseFloat(inp.dataset.baki) || 0) * 100);
            const take = Math.max(0, Math.min(baki, remain));
            inp.value = take ? (take / 100).toFixed(2) : '';
            remain -= take;
          });
          recompute();
        }
        function recompute() {
          const amaun = Math.round((parseFloat(amaunEl.value) || 0) * 100);
          let alloc = 0;
          allocEls().forEach(inp => { alloc += Math.round((parseFloat(inp.value) || 0) * 100); });
          const over = amaun - alloc;
          const ov = document.getElementById('payOverflow');
          if (amaun <= 0) { ov.classList.add('hidden'); return; }
          if (over > 0) { ov.className = 'text-xs text-brand-400'; ov.textContent = '↑ Lebihan ' + rm(over / 100) + ' → kredit ejen'; ov.classList.remove('hidden'); }
          else if (over < 0) { ov.className = 'text-xs text-red-400'; ov.textContent = '⚠ Agihan melebihi amaun sebanyak ' + rm(-over / 100); ov.classList.remove('hidden'); }
          else { ov.className = 'text-xs text-green-400'; ov.textContent = '✓ Agihan padan dengan amaun'; ov.classList.remove('hidden'); }
        }
        amaunEl.oninput = autoAgih;
        allocEls().forEach(inp => inp.oninput = recompute);
        document.getElementById('payAuto').onclick = autoAgih;
        document.getElementById('payClose').onclick = () => wrap.remove();
        wrap.onclick = ev => { if (ev.target === wrap) wrap.remove(); };

        document.getElementById('paySave').onclick = () => savePayment(st, wrap, false);
      }

      async function savePayment(st, wrap, force) {
        const errEl = document.getElementById('payErr');
        const btn = document.getElementById('paySave');
        errEl.classList.add('hidden');
        const amaun = parseFloat(document.getElementById('payAmaun').value) || 0;
        const kaedah = document.getElementById('payKaedah').value;
        const tarikh = document.getElementById('payTarikh').value;
        const rujukan = document.getElementById('payRujukan').value.trim();
        const catatan = document.getElementById('payCatatan').value.trim();
        if (amaun <= 0) { errEl.textContent = 'Amaun mesti > 0.'; errEl.classList.remove('hidden'); return; }
        const agihan = [];
        let allocSum = 0, overBaki = '';
        wrap.querySelectorAll('.pay-alloc').forEach(inp => {
          const v = parseFloat(inp.value) || 0;
          if (v > 0) {
            const baki = parseFloat(inp.dataset.baki) || 0;
            if (Math.round(v * 100) > Math.round(baki * 100)) { overBaki = inp.dataset.doc; return; }
            agihan.push({ doc_no: inp.dataset.doc, amaun: v }); allocSum += v;
          }
        });
        if (overBaki) { errEl.textContent = 'Agihan ke ' + overBaki + ' melebihi baki DO.'; errEl.classList.remove('hidden'); return; }
        if (allocSum - amaun > 0.001) { errEl.textContent = 'Jumlah agihan melebihi amaun.'; errEl.classList.remove('hidden'); return; }
        if (!payClientRef) payClientRef = (crypto.randomUUID ? crypto.randomUUID() : 'p' + Date.now() + Math.random().toString(36).slice(2));
        btn.disabled = true; btn.textContent = 'MENYIMPAN...';
        try {
          const res = await api('addPayment', { ejen_id: st.ejen.ejen_id, amaun, kaedah, tarikh, rujukan_resit: rujukan, catatan, agihan, force, client_ref: payClientRef });
          if (res.status === 'CONFIRM_DEPOSIT') {
            btn.disabled = false; btn.textContent = 'Simpan Bayaran';
            if (confirm(res.message)) { savePayment(st, wrap, true); }
            return;
          }
          if (res.status !== 'SUCCESS') { errEl.textContent = res.message; errEl.classList.remove('hidden'); btn.disabled = false; btn.textContent = 'Simpan Bayaran'; return; }
          wrap.remove();
          let msg = '✓ Bayaran disimpan';
          if (Number(res.lebih_kredit_rm) > 0) msg += ' · lebihan ' + rm(res.lebih_kredit_rm) + ' → kredit';
          toast(msg);
          openStatement(st.ejen.ejen_id);
        } catch (e) {
          errEl.textContent = 'Gagal sambung pelayan.'; errEl.classList.remove('hidden');
          btn.disabled = false; btn.textContent = 'Simpan Bayaran';
        }
      }

      loadList();
    }
