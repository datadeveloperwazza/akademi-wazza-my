      const el = document.getElementById('view') || document.getElementById('ejContent');
      if (!el) return;
      const fns = { dashboard: ejDashboard, do: ejDO, bayaran: ejBayaran, pengumuman: ejPengumuman, points: ejPoints };
      if (fns[tab]) fns[tab](el); else el.innerHTML = '<p class="text-gray-500 text-sm">Akan datang…</p>';
    }

    async function _loadLeaderboard(containerId, myEjenId) {
      const wrap = document.getElementById(containerId);
      if (!wrap) return;
      const MEDALS = ['🥇','🥈','🥉'];
      const BULAN_MY = ['Jan','Feb','Mac','Apr','Mei','Jun','Jul','Ogos','Sep','Okt','Nov','Dis'];
      const today = klToday();
      const [curY, curM] = today.slice(0,7).split('-').map(Number);
      const defaultFilter = today.slice(0,7);
      function buildDropdown(earliestBulan) {
        const sel = document.getElementById(`${containerId}-sel`);
        if (!sel) return;
        const [eY, eM] = earliestBulan.split('-').map(Number);
        const opts = ['<option value="">— Pilih Bulan —</option>'];
        let yr = curY, mo = curM;
        while (yr > eY || (yr === eY && mo >= eM)) {
          const val = `${yr}-${String(mo).padStart(2,'0')}`;
          opts.push(`<option value="${val}">${BULAN_MY[mo-1]} ${yr}</option>`);
          mo--;
          if (mo <= 0) { mo = 12; yr--; }
        }
        sel.innerHTML = opts.join('');
      }
      function setSegActive(type) {
        const bIni = document.getElementById(`${containerId}-bini`);
        const bSemua = document.getElementById(`${containerId}-bsemua`);
        const sel = document.getElementById(`${containerId}-sel`);
        const baseIni = 'px-3 py-1.5 text-xs font-medium transition rounded-l-md';
        const baseSemua = 'px-3 py-1.5 text-xs font-medium transition rounded-r-md';
        if (bIni) bIni.className = baseIni + (type==='ini' ? ' bg-gray-100 text-white' : ' text-gray-500 hover:text-gray-300');
        if (bSemua) bSemua.className = baseSemua + (type==='semua' ? ' bg-gray-100 text-white' : ' text-gray-500 hover:text-gray-300');
        if (sel && type !== 'month') sel.value = '';
      }
      async function renderLb(filter) {
        const body = document.getElementById(containerId + '-body');
        if (!body) return;
        body.innerHTML = `<div class="py-4 text-center text-xs text-gray-500">Memuatkan…</div>`;
        try {
          const res = await api('getLeaderboard', {filter});
          if (res.status !== 'SUCCESS') { body.innerHTML = `<p class="text-xs text-red-400 p-3">${esc(res.message||'Gagal.')}</p>`; return; }
          if (res.earliest_bulan) buildDropdown(res.earliest_bulan);
          if (!res.board.length) { body.innerHTML = `<p class="text-xs text-gray-500 p-4 text-center">Tiada data untuk tempoh ini.</p>`; return; }
          body.innerHTML = res.board.map(e => {
            const isMe = e.ejen_id === myEjenId;
            const medal = MEDALS[e.rank - 1];
            return `<div class="flex items-center gap-3 px-3 py-2.5 rounded-xl ${isMe ? 'bg-brand-600/10 border border-brand-500/30 mx-1 my-0.5' : 'hover:bg-gray-900/40'} transition">
              <div class="w-6 text-center shrink-0">${medal ? `<span class="text-base">${medal}</span>` : `<span class="text-xs font-bold text-gray-500">#${e.rank}</span>`}</div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-semibold text-gray-100 truncate">${esc(e.nama)}${isMe ? ' <span class="text-[9px] font-bold bg-brand-600 text-white px-1.5 py-0.5 rounded-full align-middle">SAYA</span>' : ''}</p>
                <p class="text-[10px] text-gray-500">${esc(e.tier)}${e.kawasan ? ' · ' + esc(e.kawasan) : ''}</p>
              </div>
              <div class="text-right shrink-0">
                <p class="text-sm font-bold text-amber-400">${e.pts} <span class="text-[10px] font-normal">pts</span></p>
                <p class="text-[10px] text-gray-500">RM ${Number(e.jualan_rm).toLocaleString('en-MY',{minimumFractionDigits:0,maximumFractionDigits:0})}</p>
              </div>
            </div>`;
          }).join('');
        } catch { body.innerHTML = `<p class="text-xs text-red-400 p-3">Gagal muat ranking.</p>`; }
      }
      wrap.innerHTML = `
        <div class="flex items-center justify-between mb-3 gap-3">
          <h3 class="text-sm font-bold text-gray-100">🏆 Leaderboard Points</h3>
          <div class="flex items-center bg-gray-900 border border-gray-700 rounded-md text-xs">
            <button id="${containerId}-bini" class="px-3 py-1.5 text-xs font-medium transition rounded-l-md text-gray-500 hover:text-gray-300">Bulan Ini</button>
            <div class="w-px self-stretch bg-gray-700"></div>
            <select id="${containerId}-sel" class="px-2 py-1.5 bg-transparent text-gray-500 focus:outline-none cursor-pointer">
              <option value="">— Pilih Bulan —</option>
            </select>
            <div class="w-px self-stretch bg-gray-700"></div>
            <button id="${containerId}-bsemua" class="px-3 py-1.5 text-xs font-medium transition rounded-r-md text-gray-500 hover:text-gray-300">Semua</button>
          </div>
        </div>
        <div id="${containerId}-body" class="bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden py-1"></div>`;
      document.getElementById(`${containerId}-bini`).onclick = () => { setSegActive('ini'); renderLb(defaultFilter); };
      document.getElementById(`${containerId}-bsemua`).onclick = () => { setSegActive('semua'); renderLb('semua'); };
      document.getElementById(`${containerId}-sel`).onchange = e => { if (e.target.value) { setSegActive('month'); renderLb(e.target.value); } };
      setSegActive('ini');
      renderLb(defaultFilter);
    }

    async function ejDashboard(el) {
      const rm = n => 'RM ' + Number(n).toFixed(2);
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan dashboard…</div>`;
      try {
        const res = await api('getEjenPortal', {});
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal muat data.')}</p>`; return; }
        const pct = res.target_bulanan_rm > 0 ? Math.min(100, Math.round(res.jualan_bulan_ini_rm / res.target_bulanan_rm * 100)) : null;
        el.innerHTML = `
          <h2 class="font-bold text-base mb-4 text-gray-200">Selamat datang, ${esc(res.nama)} 👋</h2>
          <div class="grid grid-cols-2 gap-3 mb-4">
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
              <p class="text-xs text-gray-500 mb-1">Jualan Bulan Ini</p>
              <p class="text-xl font-black text-brand-400">${rm(res.jualan_bulan_ini_rm)}</p>
              ${pct !== null ? `<div class="mt-2 bg-gray-800 rounded-full h-1.5 overflow-hidden"><div class="bg-brand-500 h-full rounded-full transition-all" style="width:${pct}%"></div></div><p class="text-[10px] text-gray-600 mt-1">${pct}% daripada target ${rm(res.target_bulanan_rm)}</p>` : ''}
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
              <p class="text-xs text-gray-500 mb-1">Baki Hutang</p>
              <p class="text-xl font-black ${res.hutang_rm > 0 ? 'text-red-400' : 'text-green-400'}">${rm(res.hutang_rm)}</p>
              <p class="text-[10px] text-gray-600 mt-1">${res.hutang_rm > 0 ? 'Perlu diselesaikan' : 'Tiada hutang'}</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
              <p class="text-xs text-gray-500 mb-1">Points Semasa</p>
              <p class="text-xl font-black text-amber-400">${res.points_baki} pts</p>
              <p class="text-[10px] text-gray-600 mt-1">Terkumpul keseluruhan</p>
            </div>
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4">
              <p class="text-xs text-gray-500 mb-1">Kedudukan</p>
              <p class="text-xl font-black text-sky-400">#${res.ranking}</p>
              <p class="text-[10px] text-gray-600 mt-1">daripada ${res.total_ejen} ejen aktif</p>
            </div>
          </div>
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 text-xs text-gray-400 flex justify-between mb-5">
            <span>Tier: <span class="font-bold ${res.tier==='GOLD'?'text-amber-400':'text-gray-300'}">${esc(res.tier)}</span></span>
            <span>Kawasan: ${esc(res.kawasan || '—')}</span>
            <span>Bulan: ${esc(res.bulan)}</span>
          </div>
          <div id="ejLb"></div>`;
        _loadLeaderboard('ejLb', state.staf.ejen_id);
      } catch(e) { el.innerHTML = `<p class="text-red-400 text-sm">Gagal muat dashboard. Cuba semula.</p>`; }
    }

    async function ejDO(el) {
      const rm = n => 'RM ' + Number(n).toFixed(2);
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan DO…</div>`;
      try {
        const ejenId = state.staf.ejen_id;
        const res = await api('getStatementEjen', { ejen_id: ejenId });
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal.')}</p>`; return; }
        const dos = res.do || [];
        el.innerHTML = `<h2 class="font-bold text-base mb-4">DO Saya (${dos.length})</h2>` + (dos.length ? `
          <div class="space-y-2">${dos.map(d => `
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex justify-between items-start">
              <div>
                <p class="font-mono font-bold text-sm text-brand-400">${esc(d.doc_no)}</p>
                <p class="text-xs text-gray-500 mt-0.5">${esc(d.tarikh)}</p>
              </div>
              <div class="text-right">
                <p class="font-bold text-sm">${rm(d.bersih_rm)}</p>
                <p class="text-xs mt-0.5 ${d.baki_rm > 0 ? 'text-red-400' : 'text-green-400'}">${d.status}</p>
              </div>
            </div>`).join('')}</div>` : `<p class="text-gray-500 text-sm text-center py-8">Tiada DO lagi.</p>`);
      } catch(e) { el.innerHTML = `<p class="text-red-400 text-sm">Gagal muat DO.</p>`; }
    }

    async function ejBayaran(el) {
      const rm = n => 'RM ' + Number(n).toFixed(2);
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan bayaran…</div>`;
      try {
        const ejenId = state.staf.ejen_id;
        const res = await api('getStatementEjen', { ejen_id: ejenId });
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal.')}</p>`; return; }
        const pays = (res.payments || []).filter(p => String(p.status).toUpperCase() === 'AKTIF');
        el.innerHTML = `
          <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-base">Bayaran Saya</h2>
            <span class="text-xs text-gray-400">Baki hutang: <span class="font-bold ${res.baki_hutang_rm>0?'text-red-400':'text-green-400'}">${rm(res.baki_hutang_rm)}</span></span>
          </div>` + (pays.length ? `
          <div class="space-y-2">${pays.map(p => `
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-4 flex justify-between items-center">
              <div>
                <p class="font-mono text-xs text-gray-400">${esc(p.pay_no)}</p>
                <p class="text-xs text-gray-500">${esc(p.tarikh)} · ${esc(p.kaedah)}</p>
              </div>
              <p class="font-bold text-sm text-green-400">${rm(p.amaun_rm)}</p>
            </div>`).join('')}</div>` : `<p class="text-gray-500 text-sm text-center py-8">Tiada rekod bayaran.</p>`);
      } catch(e) { el.innerHTML = `<p class="text-red-400 text-sm">Gagal muat bayaran.</p>`; }
    }

    async function ejPengumuman(el) {
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan pengumuman…</div>`;
      try {
        const res = await api('getEjenAnnouncements', {});
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal.')}</p>`; return; }
        const anns = res.announcements || [];
        const weekAgo = new Date(Date.now() - 7*86400000).toISOString().slice(0,10);
        el.innerHTML = `
          <div class="flex items-center justify-between mb-5">
            <h2 class="font-bold text-base text-gray-100">Pengumuman</h2>
            <span class="text-xs text-gray-500 bg-gray-900 border border-gray-700 px-2.5 py-1 rounded-full">${anns.length} aktif</span>
          </div>` + (anns.length ? `
          <div class="space-y-3">${anns.map(a => {
            const isNew = a.tarikh_mula >= weekAgo;
            return `<div class="bg-gray-800 border border-gray-700 rounded-2xl p-5 hover:border-gray-600 transition-colors">
              <div class="flex items-start justify-between gap-3 mb-2.5">
                <h3 class="font-bold text-gray-100 text-sm leading-snug">${esc(a.tajuk)}</h3>
                <div class="flex items-center gap-1.5 flex-shrink-0">
                  ${isNew ? '<span class="text-[9px] font-bold bg-brand-600 text-white px-1.5 py-0.5 rounded-full">BARU</span>' : ''}
                  <span class="text-[10px] text-gray-500">${esc(a.tarikh_mula)}</span>
                </div>
              </div>
              <p class="text-sm text-gray-400 leading-relaxed">${esc(a.isi)}</p>
              ${a.tarikh_tamat ? `<div class="mt-3 pt-3 border-t border-gray-700 text-[10px] text-gray-500">Sah sehingga <span class="font-semibold text-gray-400">${esc(a.tarikh_tamat)}</span></div>` : ''}
            </div>`;
          }).join('')}</div>` : `
          <div class="text-center py-16">
            <div class="w-12 h-12 mx-auto mb-3 rounded-2xl bg-gray-900 border border-gray-700 flex items-center justify-center text-gray-500">${ico('alert','w-5 h-5')}</div>
            <p class="text-gray-500 text-sm">Tiada pengumuman terkini.</p>
          </div>`);
      } catch(e) { el.innerHTML = `<p class="text-red-400 text-sm">Gagal muat pengumuman.</p>`; }
    }

    async function ejPoints(el) {
      el.innerHTML = `<div class="text-center py-10 text-gray-500 text-sm">Memuatkan points…</div>`;
      try {
        const res = await api('getEjenPoints', {});
        if (res.status !== 'SUCCESS') { el.innerHTML = `<p class="text-red-400 text-sm">${esc(res.message || 'Gagal.')}</p>`; return; }
        const hist = res.history || [];
        const jenisLabel = { DO_EARN: '🛒 DO Earn', NETWORK_BONUS: '🌐 Network Bonus', MANUAL_AWARD: '🎖 Manual Award' };
        el.innerHTML = `
          <div class="bg-gray-900 border border-gray-800 rounded-xl p-5 mb-4 text-center">
            <p class="text-xs text-gray-500 mb-1">Baki Points Semasa</p>
            <p class="text-4xl font-black text-amber-400">${res.baki}</p>
            <p class="text-xs text-gray-600 mt-1">pts</p>
          </div>
          <h3 class="font-bold text-sm mb-3 text-gray-300">Sejarah (${hist.length} transaksi)</h3>` + (hist.length ? `
          <div class="space-y-2">${hist.map(r => `
            <div class="bg-gray-900 border border-gray-800 rounded-xl p-3 flex justify-between items-center">
              <div>
                <p class="text-xs font-semibold text-gray-200">${esc(jenisLabel[r.jenis] || r.jenis)}</p>
                <p class="text-[10px] text-gray-600">${esc(r.tarikh)}${r.ref_doc ? ' · ' + esc(r.ref_doc) : ''}${r.rujukan_program ? ' · ' + esc(r.rujukan_program) : ''}</p>
              </div>
              <span class="font-bold text-sm ${r.point >= 0 ? 'text-green-400' : 'text-red-400'}">${r.point >= 0 ? '+' : ''}${r.point} pts</span>
            </div>`).join('')}</div>` : `<p class="text-gray-500 text-sm text-center py-4">Tiada transaksi points lagi.</p>`);
      } catch(e) { el.innerHTML = `<p class="text-red-400 text-sm">Gagal muat points.</p>`; }
    }

    // ===================== START =====================
    boot();
  </script>
</body>
</html>
